[package]
name = "rvoip-media-core"
# 🎯 INHERIT VERSION AND METADATA FROM WORKSPACE!
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

# Crate-specific description
description = "Media processing and codec support for the rvoip stack"

# ✨ INHERIT LINTS FROM WORKSPACE
[lints]
workspace = true
[dependencies]
# 🎯 INTERNAL CRATES - Use workspace dependencies (no version needed!)
rvoip-rtp-core.workspace = true
rvoip-infra-common.workspace = true

# Codec support
rvoip-codec-core.workspace = true

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# State management
dashmap = "5.5"
# Lock-free / lighter mutexes for the hot media-plane paths
# (jitter buffer, mixer cache, codec). `parking_lot` is faster than
# `std::sync::Mutex` and never blocks on `.await`.
parking_lot = "0.12"
# Lock-free MPMC queue used as the backing store for AudioFramePool
# and RtpBufferPool — replaces a Mutex<VecDeque> with a wait-free
# pop/push so 16 concurrent per-frame tasks no longer serialise
# through one std::Mutex per pool hit.
crossbeam-queue = "0.3"

# Async support
async-trait = "0.1"
tokio.workspace = true
anyhow.workspace = true

# Error handling
thiserror = "1.0"
async-std = "1.0"

# Bytes handling
bytes = "1.5"

# Serde for serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Random generation
rand = "0.8"

# Missing dependencies needed for compilation
uuid = { version = "1.0", features = ["v4"] }
once_cell = "1.19"           # Lazy static initialization for G.711 lookup tables
num_cpus = "1.0"             # Used for default worker thread configuration

# Advanced signal processing
rustfft = "6.1"
num-complex = "0.4"          # Used in AEC v2 implementation
apodize = "1.0"              # Used in VAD v2 for windowing functions
biquad = "0.4"               # Used in AGC v2 for digital filters

# Media codecs (optional)
opus = { version = "0.3", optional = true }
# g729 = { version = "0.3", optional = true }  # Commented out due to missing dependency

# WAV file support
hound = "3.5"

[features]
default = ["pcmu", "pcma"]
pcmu = []
pcma = []
g722 = []
memory-diagnostics = [
    "rvoip-infra-common/memory-diagnostics",
]
rtp-memory-diagnostics = ["rvoip-rtp-core/memory-diagnostics"]
perf-diagnostics = []
g729 = ["rvoip-codec-core/g729"]
opus = ["dep:opus"]
all-codecs = ["pcmu", "pcma", "g722", "g729", "opus"]

[dev-dependencies]
serial_test = "3.0"
tempfile = "3.8"
criterion = { workspace = true }
futures = "0.3"

# Performance benchmarks. Run with `cargo bench -p rvoip-media-core`. See
# `crates/sip/rvoip-sip/docs/PROFILING.md` for the broader profiling workflow.
[[bench]]
name = "audio_frame_pipeline"
harness = false

[[bench]]
name = "bridge_forward"
harness = false

[[bench]]
name = "jitter_buffer_frames"
harness = false

[[bench]]
name = "mixer"
harness = false

[[bench]]
name = "bridge_e2e"
harness = false
