[dependencies]
# Core dependencies
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"
tracing = "0.1"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
bincode = "1.3"
futures = "0.3"

# RVoIP crates - using actual package names
rvoip-infra-common = { path = "../infra-common" }
rvoip-dialog-core = { path = "../dialog-core" }
rvoip-media-core = { path = "../media-core" }
rvoip-sip-core = { path = "../sip-core" }
rvoip-rtp-core = { path = "../rtp-core" }
# RFC 4568 SDES — base64 encoding of `a=crypto: inline:` master keys.
base64 = "0.21"
rvoip-auth-core = { path = "../auth-core" }
rvoip-registrar-core = { path = "../registrar-core" }

# State management
lazy_static = "1.4"
once_cell = "1.19"
arc-swap = "1.7"

# Collections
indexmap = "2.2"
dashmap = "5.5"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Audio handling (for API compatibility)
hound = "3.5"
bytes = "1.5"

# Utility
uuid = { version = "1.4", features = ["v4"] }
rand = "0.8"
# RFC 3261 §8.1 — state-machine `Action` variant reflection for the YAML
# loader's drift-detection validation pass (see `state_table/yaml_loader.rs`
# `parse_action_by_name`).
strum = { version = "0.26", features = ["derive"] }

[dev-dependencies]
pretty_assertions = "1.4"
test-log = "0.2"
env_logger = "0.11"
tracing-subscriber = "0.3"
dotenvy = "0.15"
rvoip-sip-transport = { path = "../sip-transport" }
rvoip-registrar-core = { path = "../registrar-core" }
serial_test = { workspace = true }
tempfile = "3.14"
# Self-signed cert generation for the TLS-call integration test.
rcgen = "0.12"

[features]
default = []
event-history = []
persistence = ["sqlx"]
generated-validation = [
    "rvoip-dialog-core/generated-validation",
    "rvoip-sip-core/generated-validation",
]
# Dev-only: exposes `Config::tls_insecure_skip_verify` and forwards to
# dialog-core's matching feature (which in turn forwards to
# sip-transport's). Production builds must omit this feature so `rustls`
# always validates server certs. Forwarded here on dialog-core only —
# session-core only depends on sip-transport as a dev-dependency, and
# feature chains via dev-deps don't participate in regular builds.
dev-insecure-tls = ["rvoip-dialog-core/dev-insecure-tls"]

[[test]]
name = "generated_sip_compliance"
path = "tests/generated_sip_compliance.rs"
required-features = ["generated-validation"]

[dependencies.sqlx]
version = "0.7"
optional = true
features = ["sqlite", "runtime-tokio"]
