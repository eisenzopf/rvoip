# Basic State Table for RVoIP Session Core
# This state table contains only valid endpoint states

version: "2.0"

metadata:
  description: "Basic SIP endpoint state machine"
  author: "RVoIP Team"
  date: "2025-01-27"

# Define all valid endpoint states
states:
  # Basic call states
  - name: "Idle"
    description: "No active call"
  - name: "Initiating"
    description: "Starting outbound call"
  - name: "Ringing"
    description: "Remote party is ringing"
  - name: "Answering"
    description: "UAS accepted call, sending 200 OK, waiting for ACK"
  - name: "EarlyMedia"
    description: "Early media received"
  - name: "Active"
    description: "Call established with media flowing"
  - name: "OnHold"
    description: "Call on hold"
  - name: "Resuming"
    description: "Resuming from hold"
  - name: "Muted"
    description: "Microphone muted (still active)"
  - name: "Bridged"
    description: "Two endpoint calls bridged together"
  - name: "Terminating"
    description: "Call being terminated"
  - name: "Terminated"
    description: "Call ended"
  - name: "Cancelled"
    description: "Call was cancelled"
  - name: "Failed"
    description: "Call failed"

  # Registration states
  - name: "Registering"
    description: "SIP registration in progress"
  - name: "Registered"
    description: "Successfully registered with SIP server"
  - name: "Unregistering"
    description: "Unregistration in progress"

  # Subscription/Presence states
  - name: "Subscribing"
    description: "Subscription request in progress"
  - name: "Subscribed"
    description: "Active subscription"
  - name: "Publishing"
    description: "Publishing presence information"

  # Additional states
  - name: "Authenticating"
    description: "Processing authentication challenge"
  - name: "Messaging"
    description: "Handling SIP MESSAGE requests"

# Define conditions
conditions:
  - name: "DialogEstablished"
    description: "SIP dialog is established"
    default: false
  - name: "MediaSessionReady"
    description: "Media session is ready"
    default: false
  - name: "SDPNegotiated"
    description: "SDP has been negotiated"
    default: false
  - name: "HasRemoteSDP"
    description: "Remote SDP is available"
    default: false
  - name: "HasLocalSDP"
    description: "Local SDP is available"
    default: false
  - name: "IsRegistered"
    description: "Client is registered with SIP server"
    default: false
  - name: "IsAuthenticated"
    description: "Client has been authenticated"
    default: false

# Basic transitions for UAC (outgoing calls)
transitions:
  # UAC initiates a call
  - role: "UAC"
    state: "Idle"
    event:
      type: "MakeCall"
    next_state: "Initiating"
    actions:
      - type: "CreateDialog"
      - type: "CreateMediaSession"
      - type: "GenerateLocalSDP"
      - type: "SendINVITE"
    publish:
      - "SessionCreated"
    description: "Start outgoing call"

  # UAC receives 180 Ringing
  - role: "UAC"
    state: "Initiating"
    event:
      type: "Dialog180Ringing"
    next_state: "Ringing"
    publish:
      - "CallRinging"
    description: "Remote party is ringing"

  # UAC receives 401/407 auth challenge on INVITE (RFC 3261 §22.2).
  # StoreAuthChallenge parses the challenge into session.auth_challenge;
  # SendINVITEWithAuth computes the digest response via auth-core and
  # re-issues the INVITE with Authorization / Proxy-Authorization through
  # DialogAdapter::resend_invite_with_auth. Self-loop keeps us in
  # Initiating until either the retry succeeds or the cap trips.
  - role: "UAC"
    state: "Initiating"
    event:
      type: "AuthRequired"
    next_state: "Initiating"
    actions:
      - type: "StoreAuthChallenge"
      - type: "SendINVITEWithAuth"
    description: "INVITE auth retry (RFC 3261 §22.2)"

  # RFC 4028 §6 — UAS replied 422 Session Interval Too Small with a required
  # Min-SE header. Self-loop keeps us in Initiating while the retry action
  # re-issues the INVITE with bumped Session-Expires / Min-SE headers. The
  # 2-retry cap lives in SendINVITEWithBumpedSessionExpires; on exhaustion
  # the executor surfaces an error and the session_event_handler falls
  # through to the generic Dialog4xxFailure path. Mirrors the 423 REGISTER
  # pattern at `adapters/dialog_adapter.rs:756-800`.
  - role: "UAC"
    state: "Initiating"
    event:
      type: "SessionIntervalTooSmall"
    next_state: "Initiating"
    actions:
      - type: "SendINVITEWithBumpedSessionExpires"
    description: "422 Session Interval Too Small retry (RFC 4028 §6)"

  # UAC receives 183 Session Progress (early media)
  - role: "UAC"
    state: "Initiating"
    event:
      type: "Dialog183SessionProgress"
    next_state: "EarlyMedia"
    actions:
      - type: "NegotiateSDPAsUAC"
      - type: "StartMediaSession"
    conditions:
      sdp_negotiated: true
    description: "Early media received"

  # UAC receives 200 OK while still initiating (fast answer without ringing)
  - role: "UAC"
    state: "Initiating"
    event:
      type: "Dialog200OK"
    next_state: "Active"
    actions:
      - type: "StoreRemoteSDP"
      - type: "NegotiateSDPAsUAC"
      - type: "SendACK"
      - type: "StartMediaSession"
      - type: "SwitchToPassThroughOnActive"
    conditions:
      dialog_established: true
      sdp_negotiated: true
    publish:
      - "CallAnswered"
    description: "Call answered immediately and event published to SimplePeer"

  # UAC receives 200 OK (call answered)
  - role: "UAC"
    state: "Ringing"
    event:
      type: "Dialog200OK"
    next_state: "Active"
    actions:
      - type: "StoreRemoteSDP"
      - type: "NegotiateSDPAsUAC"
      - type: "SendACK"
      - type: "StartMediaSession"
      - type: "SwitchToPassThroughOnActive"
    conditions:
      dialog_established: true
      sdp_negotiated: true
    publish:
      - "CallEstablished"
    description: "Call answered and event published to SimplePeer"

  # UAS receives incoming call
  - role: "UAS"
    state: "Idle"
    event:
      type: "IncomingCall"
    next_state: "Ringing"
    actions:
      - type: "CreateDialog"
      - type: "CreateMediaSession"
      - type: "StoreRemoteSDP"
      - type: "SendSIPResponse"
        code: 180
        reason: "Ringing"
    publish:
      - "IncomingCallReceived"
    description: "Incoming call received and event published to SimplePeer"

  # UAS accepts call
  - role: "UAS"
    state: "Ringing"
    event:
      type: "AcceptCall"
    next_state: "Answering"
    actions:
      - type: "GenerateLocalSDP"
      - type: "NegotiateSDPAsUAS"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "Accept incoming call"

  # UAS sends reliable 183 Session Progress with SDP (RFC 3262)
  # SDP is either caller-supplied via SendEarlyMedia { sdp: Some(_) } or
  # auto-negotiated from the stored remote offer. The reliable-18x wrapping
  # (Require: 100rel + RSeq) and T1-backoff retransmit are applied
  # automatically by dialog-core when the response carries a body.
  - role: "UAS"
    state: "Ringing"
    event:
      type: "SendEarlyMedia"
    next_state: "EarlyMedia"
    actions:
      - type: "PrepareEarlyMediaSDP"
      - type: "SendSIPResponse"
        code: 183
        reason: "Session Progress"
    description: "Enter early media: send reliable 183 with SDP"

  # UAS re-emits early media (RFC 3262 §3: each reliable provisional gets a
  # fresh RSeq, so re-emission is valid). Self-loop keeps us in EarlyMedia.
  - role: "UAS"
    state: "EarlyMedia"
    event:
      type: "SendEarlyMedia"
    next_state: "EarlyMedia"
    actions:
      - type: "PrepareEarlyMediaSDP"
      - type: "SendSIPResponse"
        code: 183
        reason: "Session Progress"
    description: "Re-emit reliable 183 with updated SDP"

  # UAS accepts while in EarlyMedia — SDP already negotiated. Do NOT
  # re-run GenerateLocalSDP/NegotiateSDPAsUAS: that would open a second
  # media session and change ports mid-call. The 200 OK reuses the
  # negotiated local_sdp from the 183.
  - role: "UAS"
    state: "EarlyMedia"
    event:
      type: "AcceptCall"
    next_state: "Answering"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "Accept after early media (reuse negotiated SDP)"

  # UAS receives ACK after 200 OK
  - role: "UAS"
    state: "Answering"
    event:
      type: "DialogACK"
    next_state: "Active"
    actions:
      - type: "StartMediaSession"
      - type: "SwitchToPassThroughOnActive"
    conditions:
      dialog_established: true
      sdp_negotiated: true
    publish:
      - "CallEstablished"
    description: "Call established after ACK"

  # UAS can hangup while waiting for ACK (before dialog is fully established)
  - role: "UAS"
    state: "Answering"
    event:
      type: "HangupCall"
    next_state: "Terminating"
    actions:
      - type: "SendBYE"
      - type: "CleanupMedia"
    description: "UAS hangs up before receiving ACK"

  # UAS receives BYE before ACK (peer changed their mind)
  - role: "UAS"
    state: "Answering"
    event:
      type: "DialogBYE"
    next_state: "Terminated"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    description: "Remote party sent BYE before ACK"

  # UAS rejects call — status/reason come from the RejectCall event
  - role: "UAS"
    state: "Ringing"
    event:
      type: "RejectCall"
    next_state: "Terminated"
    actions:
      - type: "SendRejectResponse"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallRejected"
    description: "Reject incoming call"

  # UAS redirects call — status + contacts come from the RedirectCall event
  # (RFC 3261 §8.1.3.4 / §21.3). Valid from Ringing and EarlyMedia.
  - role: "UAS"
    state: "Ringing"
    event:
      type: "RedirectCall"
    next_state: "Terminated"
    actions:
      - type: "SendRedirectResponse"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallRejected"
    description: "Redirect incoming call with 3xx + Contact header"

  - role: "UAS"
    state: "EarlyMedia"
    event:
      type: "RedirectCall"
    next_state: "Terminated"
    actions:
      - type: "SendRedirectResponse"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallRejected"
    description: "Redirect after early media"

  # Both sides can hangup from Active
  - role: "Both"
    state: "Active"
    event:
      type: "HangupCall"
    next_state: "Terminating"
    actions:
      - type: "SendBYE"
      - type: "CleanupMedia"
    description: "Hangup active call"

  # Both sides receive BYE
  - role: "Both"
    state: "Active"
    event:
      type: "DialogBYE"
    next_state: "Terminating"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
      - type: "CleanupMedia"
    description: "Remote hangup"

  # Cleanup after terminating
  - role: "Both"
    state: "Terminating"
    event:
      type: "DialogTerminated"
    next_state: "Terminated"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallTerminated"
    description: "Call cleanup"

  # Hold call
  - role: "Both"
    state: "Active"
    event:
      type: "HoldCall"
    next_state: "OnHold"
    actions:
      - type: "SuspendMedia"
      - type: "SendReINVITE"
    publish:
      - "CallOnHold"
    description: "Put call on hold"

  # Resume from hold
  - role: "Both"
    state: "OnHold"
    event:
      type: "ResumeCall"
    next_state: "Resuming"
    actions:
      - type: "ResumeMedia"
      - type: "SendReINVITE"
    description: "Resume from hold"

  # Resume completed
  - role: "Both"
    state: "Resuming"
    event:
      type: "Dialog200OK"
    next_state: "Active"
    actions:
      - type: "SendACK"
    publish:
      - "CallResumed"
    description: "Resume completed"

  # Mute microphone
  - role: "Both"
    state: "Active"
    event:
      type: "MuteMicrophone"
    next_state: "Muted"
    actions:
      - type: "MuteLocalAudio"
    publish:
      - "MicrophoneMuted"
    description: "Mute microphone"

  # Unmute microphone
  - role: "Both"
    state: "Muted"
    event:
      type: "UnmuteMicrophone"
    next_state: "Active"
    actions:
      - type: "UnmuteLocalAudio"
    publish:
      - "MicrophoneUnmuted"
    description: "Unmute microphone"

  # Bridge two calls
  - role: "Both"
    state: "Active"
    event:
      type: "BridgeSessions"
    next_state: "Bridged"
    actions:
      - type: "CreateMediaBridge"
      - type: "LinkSessions"
    publish:
      - "SessionsBridged"
    description: "Bridge to another call"

  # Unbridge calls
  - role: "Both"
    state: "Bridged"
    event:
      type: "UnbridgeSessions"
    next_state: "Active"
    actions:
      - type: "DestroyMediaBridge"
      - type: "UnlinkSessions"
    publish:
      - "SessionsUnbridged"
    description: "Unbridge calls"

  # Handle REFER requests via events
  - role: "Both"
    state: "Active"
    event:
      type: "TransferRequested"
    next_state: "Active"
    actions:
      - type: "SendReferAccepted"
    description: "Handle REFER - always accept (SimplePeer gets event via SessionCrossCrateEventHandler)"

  # Registration transitions
  - role: "Both"
    state: "Idle"
    event:
      type: "StartRegistration"
    next_state: "Registering"
    actions:
      - type: "SendREGISTER"
    publish:
      - "RegistrationStarted"
    description: "Start registration"

  - role: "Both"
    state: "Registering"
    event:
      type: "Registration200OK"
    next_state: "Registered"
    conditions:
      IsRegistered: true
    publish:
      - "RegistrationSucceeded"
    description: "Registration successful"

  - role: "Both"
    state: "Registered"
    event:
      type: "StartUnregistration"
    next_state: "Unregistering"
    actions:
      - type: "SendREGISTERWithExpires0"
    description: "Start unregistration"

  - role: "Both"
    state: "Unregistering"
    event:
      type: "Registration200OK"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "UnregistrationSucceeded"
    description: "Unregistration successful"

  # Subscription/Presence transitions
  - role: "Both"
    state: "Idle"
    event:
      type: "StartSubscription"
    next_state: "Subscribing"
    actions:
      - type: "SendSUBSCRIBE"
    publish:
      - "SubscriptionStarted"
    description: "Start subscription"

  - role: "Both"
    state: "Subscribing"
    event:
      type: "Subscription200OK"
    next_state: "Subscribed"
    publish:
      - "SubscriptionActive"
    description: "Subscription active"

  - role: "Both"
    state: "Subscribed"
    event:
      type: "ReceiveNOTIFY"
    actions:
      - type: "ProcessNOTIFY"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    publish:
      - "NotificationReceived"
    description: "Process notification"

  - role: "Both"
    state: "Idle"
    event:
      type: "StartPublish"
    next_state: "Publishing"
    actions:
      - type: "SendPUBLISH"
    publish:
      - "PublishStarted"
    description: "Start publishing presence"

  - role: "Both"
    state: "Publishing"
    event:
      type: "Publish200OK"
    next_state: "Idle"
    publish:
      - "PublishSucceeded"
    description: "Publish successful"

  # MESSAGE handling
  - role: "Both"
    state: "Idle"
    event:
      type: "SendMessage"
    next_state: "Messaging"
    actions:
      - type: "SendMESSAGE"
    description: "Send SIP MESSAGE"

  - role: "Both"
    state: "Messaging"
    event:
      type: "Message200OK"
    next_state: "Idle"
    publish:
      - "MessageSent"
    description: "Message sent successfully"

  - role: "Both"
    state: "Idle"
    event:
      type: "ReceiveMESSAGE"
    actions:
      - type: "ProcessMESSAGE"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    publish:
      - "MessageReceived"
    description: "Receive SIP MESSAGE"

  # --------------------------------------------------------------------
  # UAS-side re-INVITE / UPDATE (RFC 3261 §14, RFC 3311, RFC 4028 §9)
  # --------------------------------------------------------------------
  # Ordering note: the glare (491) transitions use a HasPendingReinvite
  # guard and MUST appear before the unguarded 200 OK transitions for
  # the same (state, event) pair — the state table is scanned top-down
  # and the first matching transition wins.

  # RFC 3261 §14.1 — UAS-side glare. Peer sent us a re-INVITE while our
  # own re-INVITE is in flight. Reply 491 Request Pending so the peer
  # backs off; we keep the state unchanged and wait for our response.
  - role: "Both"
    state: "Active"
    event:
      type: "ReinviteReceived"
    guards:
      - "HasPendingReinvite"
    next_state: "Active"
    actions:
      - type: "SendSIPResponse"
        code: 491
        reason: "Request Pending"
    description: "UAS-side glare: 491 Request Pending while our re-INVITE is in flight (Active)"

  # Being in Resuming implies we have a re-INVITE in flight (the resume
  # one). Any inbound re-INVITE is by definition glare — no guard needed.
  - role: "Both"
    state: "Resuming"
    event:
      type: "ReinviteReceived"
    next_state: "Resuming"
    actions:
      - type: "SendSIPResponse"
        code: 491
        reason: "Request Pending"
    description: "UAS-side glare: 491 while resuming (always pending)"

  # RFC 3261 §14 — UAS receives re-INVITE on an established dialog, no
  # pending outgoing re-INVITE. Answer 200 OK with a negotiated SDP.
  - role: "Both"
    state: "Active"
    event:
      type: "ReinviteReceived"
    next_state: "Active"
    actions:
      - type: "NegotiateSDPAsUAS"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "UAS answers incoming re-INVITE (hold/resume/renegotiation)"

  - role: "Both"
    state: "OnHold"
    event:
      type: "ReinviteReceived"
    next_state: "OnHold"
    actions:
      - type: "NegotiateSDPAsUAS"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "UAS answers re-INVITE while on hold (peer-initiated resume)"

  # RFC 3311 / RFC 4028 §9 — UPDATE for session-timer refresh carries no
  # SDP, so we skip NegotiateSDPAsUAS. If a future UPDATE body is
  # present for mid-dialog modification, the executor has already
  # stashed it into session.remote_sdp; extending this transition to
  # renegotiate is a future enhancement.
  - role: "Both"
    state: "Active"
    event:
      type: "UpdateReceived"
    next_state: "Active"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "UAS answers UPDATE (session-timer refresh) while Active"

  - role: "Both"
    state: "OnHold"
    event:
      type: "UpdateReceived"
    next_state: "OnHold"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "UAS answers UPDATE while on hold"

  # RFC 3261 §14.1 — 491 Request Pending on a re-INVITE (glare).
  # Sleep a random interval and retry the pending hold/resume/SDP-update.
  # Transition stays in Active / OnHold so the dialog isn't torn down.
  - role: "Both"
    state: "Active"
    event:
      type: "ReinviteGlare"
    next_state: "Active"
    actions:
      - type: "ScheduleReinviteRetry"
    description: "491 Request Pending — retry re-INVITE after backoff (Active)"

  - role: "Both"
    state: "OnHold"
    event:
      type: "ReinviteGlare"
    next_state: "OnHold"
    actions:
      - type: "ScheduleReinviteRetry"
    description: "491 Request Pending — retry re-INVITE after backoff (OnHold)"

  - role: "Both"
    state: "Resuming"
    event:
      type: "ReinviteGlare"
    next_state: "Resuming"
    actions:
      - type: "ScheduleReinviteRetry"
    description: "491 Request Pending — retry re-INVITE after backoff (Resuming)"

  # RFC 3261 §8.1.3.4 — 3xx redirect. Tear down the in-flight dialog/media
  # and follow the next Contact URI via RetryWithContact. Max 5 hops is
  # enforced inside the action.
  - role: "UAC"
    state: "Initiating"
    event:
      type: "Dialog3xxRedirect"
    next_state: "Initiating"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
      - type: "CreateMediaSession"
      - type: "GenerateLocalSDP"
      - type: "RetryWithContact"
    description: "Follow 3xx redirect to next Contact URI"

  # Error handling - call failures
  - role: "Both"
    state: "Initiating"
    event:
      type: "Dialog4xxFailure"
    next_state: "Failed"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallFailed"
    description: "Call failed with 4xx error"

  - role: "Both"
    state: "Initiating"
    event:
      type: "Dialog5xxFailure"
    next_state: "Failed"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallFailed"
    description: "Call failed with 5xx error"

  - role: "Both"
    state: "Initiating"
    event:
      type: "DialogTimeout"
    next_state: "Failed"
    actions:
      - type: "SendCANCEL"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallFailed"
    description: "Call timed out"

  # Cancel outgoing call
  - role: "UAC"
    state: "Initiating"
    event:
      type: "CancelCall"
    next_state: "Cancelled"
    actions:
      - type: "SendCANCEL"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Cancel outgoing call"

  - role: "UAC"
    state: "Ringing"
    event:
      type: "CancelCall"
    next_state: "Cancelled"
    actions:
      - type: "SendCANCEL"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Cancel ringing call"

  # `SessionHandle::hangup()` is the single user-facing "stop this call"
  # API. It fires `HangupCall`; this block routes it to the CANCEL wire
  # path when appropriate, following RFC 3261 §9.1: CANCEL is only sent
  # once a provisional response has been received. Before that, there's
  # nothing to cancel on the wire — tear down locally and let Timer B
  # abort the INVITE transaction if the peer was unreachable.

  # Note: `UAC/Initiating/HangupCall` intentionally has NO transition.
  # Before any provisional response has arrived, the user's hangup is
  # a no-op at the state-machine level — the INVITE client transaction
  # in dialog-core continues retransmitting (Timer A) and ultimately
  # aborts on Timer B, at which point the existing
  # `Initiating/DialogTimeout → Failed` transition fires. Handling
  # hangup here in a DWIM way ran into an unresolved tokio-shutdown
  # hang when tests dropped sessions immediately after `make_call`
  # (see `tests/unified_api_tests.rs::test_multiple_calls`).
  # Applications that want a hard local abort before 18x should wait
  # for the callee's 180 or use the INVITE-level timeout instead.

  # Ringing (180 or reliable 18x received): CANCEL is RFC-correct.
  - role: "UAC"
    state: "Ringing"
    event:
      type: "HangupCall"
    next_state: "Cancelled"
    actions:
      - type: "SendCANCEL"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Hangup while ringing — sends CANCEL"

  # EarlyMedia (reliable 183 path): provisional already received, dialog
  # still in Early state — CANCEL is appropriate.
  - role: "UAC"
    state: "EarlyMedia"
    event:
      type: "HangupCall"
    next_state: "Cancelled"
    actions:
      - type: "SendCANCEL"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Hangup during early media — sends CANCEL"

  # Receive CANCEL for incoming call
  - role: "UAS"
    state: "Ringing"
    event:
      type: "DialogCANCEL"
    next_state: "Cancelled"
    actions:
      - type: "SendSIPResponse"
        code: 487
        reason: "Request Terminated"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Incoming call cancelled"

  # ==========================================
  # Registration Transitions
  # ==========================================

  # Start registration from Idle
  - role: "Both"
    state: "Idle"
    event:
      type: "StartRegistration"
    next_state: "Registering"
    actions:
      - type: "CreateDialog"
      - type: "SendREGISTER"
    publish:
      - "RegistrationStarted"
    description: "Start registration process"

  # Registration successful
  - role: "Both"
    state: "Registering"
    event:
      type: "Registration200OK"
    next_state: "Registered"
    conditions:
      is_registered: true
    publish:
      - "RegistrationSuccess"
    description: "Registration successful"

  # Registration failed
  - role: "Both"
    state: "Registering"
    event:
      type: "RegistrationFailed"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    publish:
      - "RegistrationFailed"
    description: "Registration failed"

  # Unregister request
  - role: "Both"
    state: "Registered"
    event:
      type: "UnregisterRequest"
    next_state: "Unregistering"
    actions:
      - type: "SendREGISTER"
    publish:
      - "UnregistrationStarted"
    description: "Start unregistration"

  # Unregistration complete
  - role: "Both"
    state: "Unregistering"
    event:
      type: "Dialog200OK"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    conditions:
      is_registered: false
    publish:
      - "UnregistrationComplete"
    description: "Unregistration complete"

  # ==========================================
  # Subscription/NOTIFY Transitions
  # ==========================================

  # Start subscription from Idle
  - role: "Both"
    state: "Idle"
    event:
      type: "StartSubscription"
    next_state: "Subscribing"
    actions:
      - type: "CreateDialog"
      - type: "SendSUBSCRIBE"
    publish:
      - "SubscriptionStarted"
    description: "Start subscription"

  # Subscription accepted
  - role: "Both"
    state: "Subscribing"
    event:
      type: "SubscriptionAccepted"
    next_state: "Subscribed"
    publish:
      - "SubscriptionActive"
    description: "Subscription accepted"

  # Receive NOTIFY in subscribed state
  - role: "Both"
    state: "Subscribed"
    event:
      type: "ReceiveNOTIFY"
    next_state: "Subscribed"
    actions:
      - type: "ProcessNOTIFY"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    publish:
      - "NotifyReceived"
    description: "Process NOTIFY message"

  # Subscription failed
  - role: "Both"
    state: "Subscribing"
    event:
      type: "SubscriptionFailed"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    publish:
      - "SubscriptionFailed"
    description: "Subscription failed"

  # Unsubscribe
  - role: "Both"
    state: "Subscribed"
    event:
      type: "UnsubscribeRequest"
    next_state: "Idle"
    actions:
      - type: "SendSUBSCRIBE"
      - type: "CleanupDialog"
    publish:
      - "UnsubscribeComplete"
    description: "Unsubscribe"

  # ==========================================
  # MESSAGE Handling Transitions
  # ==========================================

  # Send MESSAGE from Idle
  - role: "Both"
    state: "Idle"
    event:
      type: "SendMessage"
    next_state: "Messaging"
    actions:
      - type: "CreateDialog"
      - type: "SendMESSAGE"
    publish:
      - "MessageSent"
    description: "Send SIP MESSAGE"

  # MESSAGE sent successfully
  - role: "Both"
    state: "Messaging"
    event:
      type: "MessageDelivered"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    publish:
      - "MessageDelivered"
    description: "MESSAGE delivered"

  # MESSAGE sending failed
  - role: "Both"
    state: "Messaging"
    event:
      type: "MessageFailed"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    publish:
      - "MessageDeliveryFailed"
    description: "MESSAGE delivery failed"

  # Receive MESSAGE in Idle
  - role: "Both"
    state: "Idle"
    event:
      type: "ReceiveMESSAGE"
    next_state: "Idle"
    actions:
      - type: "ProcessMESSAGE"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    publish:
      - "MessageReceived"
    description: "Receive SIP MESSAGE"

  # ========================================
  # Registration Flow (UAC)
  # ========================================
  
  # Start registration
  - role: "UAC"
    state: "Idle"
    event:
      type: "StartRegistration"
    next_state: "Registering"
    actions:
      - type: "SendREGISTER"
    description: "Initiate SIP registration with server"

  # Registration successful (200 OK without challenge)
  - role: "UAC"
    state: "Registering"
    event:
      type: "Registration200OK"
    next_state: "Registered"
    conditions:
      IsRegistered: true
    publish:
      - "RegistrationSuccess"
    description: "Registration completed successfully"

  # REGISTER challenged with 401/407 (RFC 3261 §22.2). Shares the
  # `AuthRequired` event with INVITE auth — the `Registering` state
  # disambiguates this from the INVITE retry transition. Single self-loop:
  # parse + retry in one step; dialog-core's event_hub converter emits
  # `AuthRequired` directly, bypassing the old `Registration401` →
  # `Authenticating` → `RetryRegistration` → `Registering` three-step path.
  - role: "UAC"
    state: "Registering"
    event:
      type: "AuthRequired"
    next_state: "Registering"
    actions:
      - type: "StoreAuthChallenge"
      - type: "SendREGISTERWithAuth"
    description: "REGISTER auth retry (RFC 3261 §22.2)"

  # Authentication successful
  - role: "UAC"
    state: "Authenticating"
    event:
      type: "Registration200OK"
    next_state: "Registered"
    conditions:
      IsRegistered: true
    publish:
      - "RegistrationSuccess"
    description: "Registration with authentication successful"

  # Registration failed (403, 404, etc.)
  - role: "UAC"
    state: "Registering"
    event:
      type: "RegistrationFailed"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "RegistrationFailed"
    description: "Registration failed"

  # Authentication failed
  - role: "UAC"
    state: "Authenticating"
    event:
      type: "RegistrationFailed"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "RegistrationFailed"
    description: "Authentication failed"

  # Refresh registration (from Registered state)
  - role: "UAC"
    state: "Registered"
    event:
      type: "RefreshRegistration"
    next_state: "Registering"
    actions:
      - type: "SendREGISTER"
    description: "Refresh registration before expiry"

  # Unregister (expires=0)
  - role: "UAC"
    state: "Registered"
    event:
      type: "StartUnregistration"
    next_state: "Unregistering"
    actions:
      - type: "SendUnREGISTER"
    description: "Initiate unregistration (expires=0)"

  # Unregistration successful
  - role: "UAC"
    state: "Unregistering"
    event:
      type: "Unregistration200OK"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "UnregistrationSuccess"
    description: "Unregistration completed"

  # Unregistration failed (still clear local state)
  - role: "UAC"
    state: "Unregistering"
    event:
      type: "UnregistrationFailed"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "UnregistrationFailed"
    description: "Unregistration failed but cleared local state"
