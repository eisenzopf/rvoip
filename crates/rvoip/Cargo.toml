[package]
name = "rvoip"
version = "0.1.0-alpha.1"
publish = false  # Alpha-tier; held until rvoip-sip stabilizes and more substrates reach beta.
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

description = "Universal real-time gateway library — SIP, WebRTC, UCTP (QUIC / WebTransport / WebSocket) plus AI voice harness and vCon container, behind one facade."

[lints]
workspace = true

# ---------------------------------------------------------------------------
# Dependencies
# ---------------------------------------------------------------------------
#
# rvoip-core is the implementation crate; the facade legitimately
# re-exports its `Orchestrator` + `Config`. This is the only direct
# dep on `rvoip-core` permitted by the workspace `deny.toml` (it's
# listed in `[bans.wrappers]`).

[dependencies]
rvoip-core         = { workspace = true }
rvoip-core-traits  = { workspace = true }

# SIP interop adapter — gated on the `sip` feature.
rvoip-sip          = { workspace = true, optional = true }

# WebRTC interop adapter — gated on `webrtc` (off by default).
rvoip-webrtc       = { workspace = true, optional = true }

# UCTP substrate adapters — gated on `uctp`.
rvoip-uctp         = { workspace = true, optional = true }
rvoip-quic         = { workspace = true, optional = true }
rvoip-webtransport = { workspace = true, optional = true }
rvoip-websocket    = { workspace = true, optional = true }

# AI voice harness — gated on `harness`.
rvoip-harness      = { workspace = true, optional = true }

# vCon container — gated on `vcon`.
rvoip-vcon         = { workspace = true, optional = true }

# Identity provider backends — gated on `identity`.
rvoip-identity     = { workspace = true, optional = true }

# Client SDK — gated on `client`.
rvoip-client       = { workspace = true, optional = true }

# ---------------------------------------------------------------------------
# Feature flags — match `INTERFACE_DESIGN.md` §2.2
# ---------------------------------------------------------------------------

[features]
default = ["uctp", "sip", "vcon", "identity"]

# UCTP substrate family (QUIC + WebTransport + WebSocket).
uctp = [
    "dep:rvoip-uctp",
    "dep:rvoip-quic",
    "dep:rvoip-webtransport",
    "dep:rvoip-websocket",
]

# SIP interop adapter.
sip = ["dep:rvoip-sip"]

# WebRTC interop adapter.
webrtc = ["dep:rvoip-webrtc"]

# vCon container + signing.
vcon = ["dep:rvoip-vcon"]

# Identity provider backends.
identity = ["dep:rvoip-identity"]

# In-process AI voice harness (ASR / TTS / DialogManager).
harness = ["dep:rvoip-harness"]

# Client-side SDK (rvoip-client crate, INTERFACE_DESIGN §15).
client = ["dep:rvoip-client"]

# Experimental: AAuth identity backend. Per
# `INTERFACE_DESIGN.md` §8.5, AAuth's IETF draft is not yet stable;
# the trait surface accommodates it but no production commitment.
aauth-experimental = []

# DTLS-SRTP fingerprint binding — feature-flagged in v1 per
# `INTERFACE_DESIGN.md` §8.4. Off by default.
identity-fingerprint-binding = []

# Everything compiled in (the Thelve-shaped deployment).
full = [
    "uctp",
    "sip",
    "webrtc",
    "vcon",
    "identity",
    "harness",
    "client",
    "aauth-experimental",
    "identity-fingerprint-binding",
]

[dev-dependencies]
tokio              = { workspace = true }
anyhow             = { workspace = true }
serial_test        = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
