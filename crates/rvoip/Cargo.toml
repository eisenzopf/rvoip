[package]
name = "rvoip"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

description = "Universal real-time gateway library — SIP, WebRTC, UCTP (QUIC / WebTransport / WebSocket) plus AI voice harness and vCon container, behind one facade."

[lints]
workspace = true

# ---------------------------------------------------------------------------
# Dependencies
# ---------------------------------------------------------------------------
#
# rvoip-core is the implementation crate; the facade legitimately
# re-exports its `Orchestrator` + `Config`. This is the only direct
# dep on `rvoip-core` permitted by the workspace `deny.toml` (it's
# listed in `[bans.wrappers]`).

[dependencies]
rvoip-core         = { workspace = true }
rvoip-core-traits  = { workspace = true }

# SIP interop adapter — `sip` feature.
rvoip-sip          = { workspace = true, optional = true }
# STIR/SHAKEN caller-ID attestation (SIP-only) — `sip-stir-shaken` feature.
rvoip-stir-shaken  = { workspace = true, optional = true }

# WebRTC interop adapter — `webrtc` feature.
rvoip-webrtc       = { workspace = true, optional = true }

# UCTP substrate adapters — `uctp` feature.
rvoip-uctp         = { workspace = true, optional = true }
rvoip-quic         = { workspace = true, optional = true }
rvoip-webtransport = { workspace = true, optional = true }
rvoip-websocket    = { workspace = true, optional = true }

# voip-3 conversation-model extensions — reachable only via the `voip-3` feature.
rvoip-vcon         = { workspace = true, optional = true }
rvoip-identity     = { workspace = true, optional = true }
rvoip-harness      = { workspace = true, optional = true }

# Client SDK — `client` feature.
rvoip-client       = { workspace = true, optional = true }

# ---------------------------------------------------------------------------
# Feature flags. Maturity: `sip` is beta; every other surface is alpha (0.1.x).
# Grouped by what each is tied to (see INTERFACE_DESIGN.md §2.2).
# ---------------------------------------------------------------------------

[features]
default = ["sip"]

# ── Transports / surfaces ──
sip      = ["dep:rvoip-sip"]
webrtc   = ["dep:rvoip-webrtc"]
uctp     = ["dep:rvoip-uctp", "dep:rvoip-quic", "dep:rvoip-webtransport", "dep:rvoip-websocket"]

# ── SIP add-on (requires SIP): RFC 8224 caller-ID attestation ──
sip-stir-shaken = ["sip", "dep:rvoip-stir-shaken"]

# ── Full rvoip-3 experience: every transport + the conversation-model extensions
#    (vCon emission, identity backends, AI harness). vcon / identity / harness are
#    reachable ONLY through this meta-feature, never as standalone features. ──
voip-3 = ["sip", "webrtc", "uctp", "dep:rvoip-vcon", "dep:rvoip-identity", "dep:rvoip-harness"]

# ── Standalone cross-transport client SDK ──
client = ["dep:rvoip-client"]

# ── Everything ──
full = ["voip-3", "sip-stir-shaken", "client"]

[dev-dependencies]
tokio              = { workspace = true }
anyhow             = { workspace = true }
serial_test        = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
