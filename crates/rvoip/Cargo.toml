[package]
name = "rvoip"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

description = "Universal real-time gateway library — SIP, WebRTC, UCTP (QUIC / WebTransport / WebSocket) plus AI voice harness and vCon container, behind one facade."

[lints]
workspace = true

# ---------------------------------------------------------------------------
# Dependencies
# ---------------------------------------------------------------------------
#
# rvoip-core is the implementation crate; the facade legitimately
# re-exports its `Orchestrator` + `Config`. This is the only direct
# dep on `rvoip-core` permitted by the workspace `deny.toml` (it's
# listed in `[bans.wrappers]`).

[dependencies]
rvoip-core         = { workspace = true }
rvoip-core-traits  = { workspace = true }

# SIP interop adapter — gated on the `sip` feature.
rvoip-sip          = { workspace = true, optional = true }

# AI voice harness — gated on `harness`.
rvoip-harness      = { workspace = true, optional = true }

# vCon container — gated on `vcon`.
rvoip-vcon         = { workspace = true, optional = true }

# ---------------------------------------------------------------------------
# Feature flags — match `INTERFACE_DESIGN.md` §2.2
# ---------------------------------------------------------------------------

[features]
default = ["sip", "vcon"]

# SIP interop adapter.
sip = ["dep:rvoip-sip"]

# vCon container + signing.
vcon = ["dep:rvoip-vcon"]

# In-process AI voice harness (ASR / TTS / DialogManager).
harness = ["dep:rvoip-harness"]

# Everything compiled in for this beta (SIP product surface).
full = ["sip", "vcon", "harness"]

[dev-dependencies]
tokio              = { workspace = true }
anyhow             = { workspace = true }
serial_test        = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
