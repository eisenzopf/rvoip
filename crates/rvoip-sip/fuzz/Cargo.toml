[package]
name = "rvoip-sip-fuzz"
version = "0.0.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
bytes = "1"
libfuzzer-sys = "0.4"
rvoip-sip-core = { path = "../../rvoip-sip-core" }

[[bin]]
name = "sip_message"
path = "fuzz_targets/sip_message.rs"
