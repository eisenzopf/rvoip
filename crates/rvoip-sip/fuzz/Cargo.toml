doc = false
bench = false

[[bin]]
name = "uri"
path = "fuzz_targets/uri.rs"
test = false
doc = false
bench = false

[[bin]]
name = "header"
path = "fuzz_targets/header.rs"
test = false
doc = false
bench = false

[[bin]]
name = "sdp"
path = "fuzz_targets/sdp.rs"
test = false
doc = false
bench = false

[workspace]
