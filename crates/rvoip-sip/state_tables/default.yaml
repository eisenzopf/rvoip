# Basic State Table for RVoIP Session Core
# This state table contains only valid endpoint states

version: "2.0"

metadata:
  description: "Basic SIP endpoint state machine"
  author: "RVoIP Team"
  date: "2025-01-27"

# Define all valid endpoint states
states:
  # Basic call states
  - name: "Idle"
    description: "No active call"
  - name: "Initiating"
    description: "Starting outbound call"
  - name: "CancelPending"
    description: "Local cancel requested before CANCEL is legal on the wire"
  - name: "Cancelling"
    description: "CANCEL sent or late answer being ACK/BYE cleaned up"
  - name: "Ringing"
    description: "Remote party is ringing"
  - name: "Answering"
    description: "UAS accepted call, sending 200 OK, waiting for ACK"
  - name: "AnsweringHangupPending"
    description: "UAS sent 200 OK and local hangup is waiting for ACK before BYE"
  - name: "EarlyMedia"
    description: "Early media received"
  - name: "Active"
    description: "Call established with media flowing"
  - name: "OnHold"
    description: "Call on hold"
  - name: "Resuming"
    description: "Resuming from hold"
  - name: "Muted"
    description: "Microphone muted (still active)"
  - name: "Bridged"
    description: "Two endpoint calls bridged together"
  - name: "Terminating"
    description: "Call being terminated"
  - name: "Terminated"
    description: "Call ended"
  - name: "Cancelled"
    description: "Call was cancelled"
  - name: "Failed"
    description: "Call failed"

  # Registration states
  - name: "Registering"
    description: "SIP registration in progress"
  - name: "Registered"
    description: "Successfully registered with SIP server"
  - name: "Unregistering"
    description: "Unregistration in progress"

  # Subscription/Presence states
  - name: "Subscribing"
    description: "Subscription request in progress"
  - name: "Subscribed"
    description: "Active subscription"
  - name: "Publishing"
    description: "Publishing presence information"

  # Additional states
  - name: "Authenticating"
    description: "Processing authentication challenge"
  - name: "Messaging"
    description: "Handling SIP MESSAGE requests"

# Define conditions
conditions:
  - name: "DialogEstablished"
    description: "SIP dialog is established"
    default: false
  - name: "MediaSessionReady"
    description: "Media session is ready"
    default: false
  - name: "SDPNegotiated"
    description: "SDP has been negotiated"
    default: false
  - name: "HasRemoteSDP"
    description: "Remote SDP is available"
    default: false
  - name: "HasLocalSDP"
    description: "Local SDP is available"
    default: false
  - name: "IsRegistered"
    description: "Client is registered with SIP server"
    default: false
  - name: "IsAuthenticated"
    description: "Client has been authenticated"
    default: false

# Basic transitions for UAC (outgoing calls)
transitions:
  # UAC initiates a call
  - role: "UAC"
    state: "Idle"
    event:
      type: "MakeCall"
    next_state: "Initiating"
    actions:
      - type: "CreateDialog"
      - type: "CreateMediaSession"
      - type: "GenerateLocalSDP"
      - type: "SendINVITE"
    publish:
      - "SessionCreated"
    description: "Start outgoing call"

  # UAC receives 180 Ringing
  - role: "UAC"
    state: "Initiating"
    event:
      type: "Dialog180Ringing"
    next_state: "Ringing"
    actions:
      # RFC 3515 §2.4.5: if this UAC is a transfer leg
      # (session.transferor_session_id.is_some()) fire a 180 progress
      # NOTIFY back on the transferor's REFER subscription. No-op for
      # non-transfer calls.
      - type: "SendTransferNotifyRinging"
    publish:
      - "CallRinging"
    description: "Remote party is ringing"

  # UAC receives 401/407 auth challenge on INVITE (RFC 3261 §22.2).
  # StoreAuthChallenge parses the challenge into session.auth_challenge;
  # SendINVITEWithAuth computes the digest response via auth-core and
  # re-issues the INVITE with Authorization / Proxy-Authorization through
  # DialogAdapter::resend_invite_with_auth. Self-loop keeps us in
  # Initiating until either the retry succeeds or the cap trips.
  - role: "UAC"
    state: "Initiating"
    event:
      type: "AuthRequired"
    next_state: "Initiating"
    actions:
      - type: "StoreAuthChallenge"
      - type: "SendINVITEWithAuth"
    description: "INVITE auth retry (RFC 3261 §22.2)"

  # RFC 4028 §6 — UAS replied 422 Session Interval Too Small with a required
  # Min-SE header. Self-loop keeps us in Initiating while the retry action
  # re-issues the INVITE with bumped Session-Expires / Min-SE headers. The
  # 2-retry cap lives in SendINVITEWithBumpedSessionExpires; on exhaustion
  # the executor surfaces an error and the session_event_handler falls
  # through to the generic Dialog4xxFailure path. Mirrors the 423 REGISTER
  # pattern at `adapters/dialog_adapter.rs:756-800`.
  - role: "UAC"
    state: "Initiating"
    event:
      type: "SessionIntervalTooSmall"
    next_state: "Initiating"
    actions:
      - type: "SendINVITEWithBumpedSessionExpires"
    description: "422 Session Interval Too Small retry (RFC 4028 §6)"

  # UAC receives 183 Session Progress (early media)
  - role: "UAC"
    state: "Initiating"
    event:
      type: "Dialog183SessionProgress"
    next_state: "EarlyMedia"
    actions:
      - type: "NegotiateSDPAsUAC"
      - type: "StartMediaSession"
    conditions:
      sdp_negotiated: true
    description: "Early media received"

  # UAC receives 200 OK while still initiating (fast answer without ringing)
  - role: "UAC"
    state: "Initiating"
    event:
      type: "Dialog200OK"
    next_state: "Active"
    actions:
      - type: "StoreRemoteSDP"
      - type: "NegotiateSDPAsUAC"
      - type: "SendACK"
      - type: "StartMediaSession"
      - type: "SwitchToPassThroughOnActive"
      # RFC 3515 §2.4.5 — fires only for transfer legs; no-op otherwise.
      # Ordered after media commit so a NOTIFY-send failure can't roll
      # back call establishment.
      - type: "SendTransferNotifySuccess"
      # SIP_API_DESIGN_2 §7.3 invariant #2 — final response for the
      # INVITE; release the stash so a subsequent re-INVITE / new call
      # is not rejected by the conflict guard.
      - type: "ClearPendingINVITEOptions"
    conditions:
      dialog_established: true
      sdp_negotiated: true
    publish:
      - "CallAnswered"
    description: "Call answered immediately and event published to SimplePeer"

  # UAC receives 200 OK (call answered)
  - role: "UAC"
    state: "Ringing"
    event:
      type: "Dialog200OK"
    next_state: "Active"
    actions:
      - type: "StoreRemoteSDP"
      - type: "NegotiateSDPAsUAC"
      - type: "SendACK"
      - type: "StartMediaSession"
      - type: "SwitchToPassThroughOnActive"
      # RFC 3515 §2.4.5 — transfer-leg final success NOTIFY. No-op for
      # non-transfer calls. Placed after media commit for the same reason
      # as the Initiating→Active path above.
      - type: "SendTransferNotifySuccess"
      # SIP_API_DESIGN_2 §7.3 invariant #2 — final response on the
      # INVITE; release the stash.
      - type: "ClearPendingINVITEOptions"
    conditions:
      dialog_established: true
      sdp_negotiated: true
    publish:
      - "CallEstablished"
    description: "Call answered and event published to SimplePeer"

  # UAC receives 200 OK after 183 Session Progress. The dialog is now
  # confirmed; media may already be running from early media, so StartMediaSession
  # is idempotent and ACK/BYE semantics must move to Active.
  - role: "UAC"
    state: "EarlyMedia"
    event:
      type: "Dialog200OK"
    next_state: "Active"
    actions:
      - type: "StoreRemoteSDP"
      - type: "NegotiateSDPAsUAC"
      - type: "SendACK"
      - type: "StartMediaSession"
      - type: "SwitchToPassThroughOnActive"
      # RFC 3515 §2.4.5 — transfer-leg final success NOTIFY. No-op for
      # normal calls; required when the transferred call receives 183 before
      # final answer.
      - type: "SendTransferNotifySuccess"
    conditions:
      dialog_established: true
      sdp_negotiated: true
      media_session_ready: true
    publish:
      - "CallEstablished"
    description: "Call answered after early media and event published to SimplePeer"

  # UAS receives incoming call
  - role: "UAS"
    state: "Idle"
    event:
      type: "IncomingCall"
    next_state: "Ringing"
    actions:
      - type: "CreateDialog"
      - type: "CreateMediaSession"
      - type: "StoreRemoteSDP"
      - type: "SendSIPResponse"
        code: 180
        reason: "Ringing"
    publish:
      - "IncomingCallReceived"
    description: "Incoming call received and event published to SimplePeer"

  # UAS accepts call
  - role: "UAS"
    state: "Ringing"
    event:
      type: "AcceptCall"
    next_state: "Answering"
    actions:
      - type: "GenerateLocalSDP"
      - type: "NegotiateSDPAsUAS"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "Accept incoming call"

  # UAS sends reliable 183 Session Progress with SDP (RFC 3262)
  # SDP is either caller-supplied via SendEarlyMedia { sdp: Some(_) } or
  # auto-negotiated from the stored remote offer. The reliable-18x wrapping
  # (Require: 100rel + RSeq) and T1-backoff retransmit are applied
  # automatically by dialog-core when the response carries a body.
  - role: "UAS"
    state: "Ringing"
    event:
      type: "SendEarlyMedia"
    next_state: "EarlyMedia"
    actions:
      - type: "PrepareEarlyMediaSDP"
      - type: "SendSIPResponse"
        code: 183
        reason: "Session Progress"
    description: "Enter early media: send reliable 183 with SDP"

  # UAS re-emits early media (RFC 3262 §3: each reliable provisional gets a
  # fresh RSeq, so re-emission is valid). Self-loop keeps us in EarlyMedia.
  - role: "UAS"
    state: "EarlyMedia"
    event:
      type: "SendEarlyMedia"
    next_state: "EarlyMedia"
    actions:
      - type: "PrepareEarlyMediaSDP"
      - type: "SendSIPResponse"
        code: 183
        reason: "Session Progress"
    description: "Re-emit reliable 183 with updated SDP"

  # UAS accepts while in EarlyMedia — SDP already negotiated. Do NOT
  # re-run GenerateLocalSDP/NegotiateSDPAsUAS: that would open a second
  # media session and change ports mid-call. The 200 OK reuses the
  # negotiated local_sdp from the 183.
  - role: "UAS"
    state: "EarlyMedia"
    event:
      type: "AcceptCall"
    next_state: "Answering"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "Accept after early media (reuse negotiated SDP)"

  # UAS receives ACK after 200 OK
  - role: "UAS"
    state: "Answering"
    event:
      type: "DialogACK"
    next_state: "Active"
    actions:
      - type: "StartMediaSession"
      - type: "SwitchToPassThroughOnActive"
    conditions:
      dialog_established: true
      sdp_negotiated: true
    publish:
      - "CallEstablished"
    description: "Call established after ACK"

  # UAS can hangup while waiting for ACK (before dialog is fully established)
  - role: "UAS"
    state: "Answering"
    event:
      type: "HangupCall"
    next_state: "AnsweringHangupPending"
    description: "UAS local hangup after 200 OK waits for ACK before BYE (RFC 3261 13.3.1.4)"

  # ACK completes the INVITE 3-way handshake; now BYE is legal.
  - role: "UAS"
    state: "AnsweringHangupPending"
    event:
      type: "DialogACK"
    next_state: "Terminating"
    actions:
      - type: "SendBYE"
      - type: "CleanupMedia"
    description: "ACK received after pending UAS hangup; send BYE"

  # Missing ACK after 200 OK fails the call attempt; BYE is not legal
  # because the dialog was never confirmed by the UAC.
  - role: "UAS"
    state: "Answering"
    event:
      type: "DialogTimeout"
    next_state: "Failed"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallFailed"
    description: "UAS 200 OK was not ACKed"

  - role: "UAS"
    state: "AnsweringHangupPending"
    event:
      type: "DialogTimeout"
    next_state: "Failed"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallFailed"
    description: "UAS pending hangup failed because ACK never arrived"

  # UAS receives BYE before ACK (peer changed their mind)
  - role: "UAS"
    state: "Answering"
    event:
      type: "DialogBYE"
    next_state: "Terminated"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    description: "Remote party sent BYE before ACK"

  - role: "UAS"
    state: "AnsweringHangupPending"
    event:
      type: "DialogBYE"
    next_state: "Terminated"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    description: "Remote party sent BYE while local hangup was waiting for ACK"

  # UAS rejects call — status/reason come from the RejectCall event
  - role: "UAS"
    state: "Ringing"
    event:
      type: "RejectCall"
    next_state: "Terminated"
    actions:
      - type: "SendRejectResponse"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallRejected"
    description: "Reject incoming call"

  # UAS redirects call — status + contacts come from the RedirectCall event
  # (RFC 3261 §8.1.3.4 / §21.3). Valid from Ringing and EarlyMedia.
  - role: "UAS"
    state: "Ringing"
    event:
      type: "RedirectCall"
    next_state: "Terminated"
    actions:
      - type: "SendRedirectResponse"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallRejected"
    description: "Redirect incoming call with 3xx + Contact header"

  - role: "UAS"
    state: "EarlyMedia"
    event:
      type: "RedirectCall"
    next_state: "Terminated"
    actions:
      - type: "SendRedirectResponse"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallRejected"
    description: "Redirect after early media"

  # Both sides can hangup from Active
  - role: "Both"
    state: "Active"
    event:
      type: "HangupCall"
    next_state: "Terminating"
    actions:
      - type: "SendBYE"
      - type: "CleanupMedia"
    description: "Hangup active call"

  # Both sides receive BYE
  - role: "Both"
    state: "Active"
    event:
      type: "DialogBYE"
    next_state: "Terminating"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
      - type: "CleanupMedia"
    description: "Remote hangup"

  # Cleanup after terminating
  - role: "Both"
    state: "Terminating"
    event:
      type: "DialogTerminated"
    next_state: "Terminated"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallTerminated"
    description: "Call cleanup"

  # RFC 3261 §14.1 — Hold is a re-INVITE. Session parameters MUST NOT
  # change until a 2xx response arrives. We enter an intermediate
  # `HoldPending` state; actual OnHold commit and media suspend happen
  # on `Dialog200OK`. Non-2xx / timeout roll back to `Active`.
  - role: "Both"
    state: "Active"
    event:
      type: "HoldCall"
    next_state: "HoldPending"
    actions:
      - type: "SendReINVITE"
    description: "Send hold re-INVITE; stay on current media until 2xx (RFC 3261 §14.1)"

  - role: "Both"
    state: "HoldPending"
    event:
      type: "Dialog200OK"
    next_state: "OnHold"
    actions:
      - type: "NegotiateSDPAsUAC"
      - type: "SendACK"
      - type: "SuspendMedia"
      - type: "ClearPendingReinvite"
    publish:
      - "CallOnHold"
    description: "Hold confirmed by 2xx — commit OnHold and suspend media"

  # RFC 3261 §14.1 — non-2xx / timeout on hold re-INVITE: session unchanged
  - role: "Both"
    state: "HoldPending"
    event:
      type: "Dialog4xxFailure"
    next_state: "Active"
    actions:
      - type: "ClearPendingReinvite"
    description: "Hold re-INVITE rejected — session parameters unchanged (RFC 3261 §14.1)"

  - role: "Both"
    state: "HoldPending"
    event:
      type: "Dialog5xxFailure"
    next_state: "Active"
    actions:
      - type: "ClearPendingReinvite"
    description: "Hold re-INVITE 5xx — session unchanged (RFC 3261 §14.1)"

  - role: "Both"
    state: "HoldPending"
    event:
      type: "Dialog6xxFailure"
    next_state: "Active"
    actions:
      - type: "ClearPendingReinvite"
    description: "Hold re-INVITE 6xx — session unchanged (RFC 3261 §14.1)"

  - role: "Both"
    state: "HoldPending"
    event:
      type: "DialogTimeout"
    next_state: "Active"
    actions:
      - type: "ClearPendingReinvite"
    description: "Hold re-INVITE Timer B expired — session unchanged (RFC 3261 §14.1)"

  # Resume from hold — enter intermediate `Resuming` state; commit Active
  # and resume media only on `Dialog200OK`. Non-2xx / timeout roll back
  # to `OnHold`.
  - role: "Both"
    state: "OnHold"
    event:
      type: "ResumeCall"
    next_state: "Resuming"
    actions:
      - type: "SendReINVITE"
    description: "Send resume re-INVITE; stay held until 2xx (RFC 3261 §14.1)"

  - role: "Both"
    state: "Resuming"
    event:
      type: "Dialog200OK"
    next_state: "Active"
    actions:
      - type: "NegotiateSDPAsUAC"
      - type: "SendACK"
      - type: "ResumeMedia"
      - type: "ClearPendingReinvite"
    publish:
      - "CallResumed"
    description: "Resume confirmed by 2xx — commit Active and resume media"

  # RFC 3261 §14.1 — non-2xx / timeout on resume re-INVITE: stay held
  - role: "Both"
    state: "Resuming"
    event:
      type: "Dialog4xxFailure"
    next_state: "OnHold"
    actions:
      - type: "ClearPendingReinvite"
    description: "Resume re-INVITE rejected — stay held (RFC 3261 §14.1)"

  - role: "Both"
    state: "Resuming"
    event:
      type: "Dialog5xxFailure"
    next_state: "OnHold"
    actions:
      - type: "ClearPendingReinvite"
    description: "Resume re-INVITE 5xx — stay held (RFC 3261 §14.1)"

  - role: "Both"
    state: "Resuming"
    event:
      type: "Dialog6xxFailure"
    next_state: "OnHold"
    actions:
      - type: "ClearPendingReinvite"
    description: "Resume re-INVITE 6xx — stay held (RFC 3261 §14.1)"

  - role: "Both"
    state: "Resuming"
    event:
      type: "DialogTimeout"
    next_state: "OnHold"
    actions:
      - type: "ClearPendingReinvite"
    description: "Resume re-INVITE Timer B expired — stay held (RFC 3261 §14.1)"

  # Bridge two calls
  - role: "Both"
    state: "Active"
    event:
      type: "BridgeSessions"
    next_state: "Bridged"
    actions:
      - type: "CreateMediaBridge"
      - type: "LinkSessions"
    publish:
      - "SessionsBridged"
    description: "Bridge to another call"

  # Unbridge calls
  - role: "Both"
    state: "Bridged"
    event:
      type: "UnbridgeSessions"
    next_state: "Active"
    actions:
      - type: "DestroyMediaBridge"
      - type: "UnlinkSessions"
    publish:
      - "SessionsUnbridged"
    description: "Unbridge calls"

  # Handle REFER requests via events
  - role: "Both"
    state: "Active"
    event:
      type: "TransferRequested"
    next_state: "Active"
    actions:
      # RFC 3515 §2.4.5 — 100 Trying acknowledges the implicit
      # subscription on REFER acceptance. Emitted on this session's own
      # dialog (we're the REFER receiver), before 202 Accepted, so the
      # transferor sees subscription confirmation immediately.
      - type: "SendRefer100Trying"
      - type: "SendReferAccepted"
    description: "Handle REFER - always accept (SimplePeer gets event via SessionCrossCrateEventHandler)"

  # Registration transitions
  - role: "Both"
    state: "Idle"
    event:
      type: "StartRegistration"
    next_state: "Registering"
    actions:
      - type: "SendREGISTER"
    publish:
      - "RegistrationStarted"
    description: "Start registration"

  - role: "Both"
    state: "Registering"
    event:
      type: "Registration200OK"
    next_state: "Registered"
    conditions:
      IsRegistered: true
    publish:
      - "RegistrationSucceeded"
    description: "Registration successful"

  - role: "Both"
    state: "Registered"
    event:
      type: "StartUnregistration"
    next_state: "Unregistering"
    actions:
      - type: "SendREGISTERWithExpires0"
    description: "Start unregistration"

  - role: "Both"
    state: "Unregistering"
    event:
      type: "Registration200OK"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "UnregistrationSucceeded"
    description: "Unregistration successful"

  # Subscription/Presence transitions
  - role: "Both"
    state: "Idle"
    event:
      type: "StartSubscription"
    next_state: "Subscribing"
    actions:
      - type: "SendSUBSCRIBE"
    publish:
      - "SubscriptionStarted"
    description: "Start subscription"

  - role: "Both"
    state: "Subscribing"
    event:
      type: "Subscription200OK"
    next_state: "Subscribed"
    publish:
      - "SubscriptionActive"
    description: "Subscription active"

  - role: "Both"
    state: "Subscribed"
    event:
      type: "ReceiveNOTIFY"
    actions:
      - type: "ProcessNOTIFY"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    publish:
      - "NotificationReceived"
    description: "Process notification"

  - role: "Both"
    state: "Idle"
    event:
      type: "StartPublish"
    next_state: "Publishing"
    actions:
      - type: "SendPUBLISH"
    publish:
      - "PublishStarted"
    description: "Start publishing presence"

  - role: "Both"
    state: "Publishing"
    event:
      type: "Publish200OK"
    next_state: "Idle"
    publish:
      - "PublishSucceeded"
    description: "Publish successful"

  # MESSAGE handling
  - role: "Both"
    state: "Idle"
    event:
      type: "SendMessage"
    next_state: "Messaging"
    actions:
      - type: "SendMESSAGE"
    description: "Send SIP MESSAGE"

  - role: "Both"
    state: "Messaging"
    event:
      type: "Message200OK"
    next_state: "Idle"
    publish:
      - "MessageSent"
    description: "Message sent successfully"

  - role: "Both"
    state: "Idle"
    event:
      type: "ReceiveMESSAGE"
    actions:
      - type: "ProcessMESSAGE"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    publish:
      - "MessageReceived"
    description: "Receive SIP MESSAGE"

  # --------------------------------------------------------------------
  # UAS-side re-INVITE / UPDATE (RFC 3261 §14, RFC 3311, RFC 4028 §9)
  # --------------------------------------------------------------------
  # Ordering note: the glare (491) transitions use a HasPendingReinvite
  # guard and MUST appear before the unguarded 200 OK transitions for
  # the same (state, event) pair — the state table is scanned top-down
  # and the first matching transition wins.

  # RFC 3261 §14.1 — UAS-side glare. Peer sent us a re-INVITE while our
  # own re-INVITE is in flight. Reply 491 Request Pending so the peer
  # backs off; we keep the state unchanged and wait for our response.
  - role: "Both"
    state: "Active"
    event:
      type: "ReinviteReceived"
    guards:
      - "HasPendingReinvite"
    next_state: "Active"
    actions:
      - type: "SendSIPResponse"
        code: 491
        reason: "Request Pending"
    description: "UAS-side glare: 491 Request Pending while our re-INVITE is in flight (Active)"

  # Being in Resuming implies we have a re-INVITE in flight (the resume
  # one). Any inbound re-INVITE is by definition glare — no guard needed.
  - role: "Both"
    state: "Resuming"
    event:
      type: "ReinviteReceived"
    next_state: "Resuming"
    actions:
      - type: "SendSIPResponse"
        code: 491
        reason: "Request Pending"
    description: "UAS-side glare: 491 while resuming (always pending)"

  # RFC 3261 §14.1 glare resolution: if the peer sends us a hold re-INVITE
  # while we're already in HoldPending (both sides wanted to hold
  # simultaneously), accept their re-INVITE with 200 OK and transition to
  # OnHold. Our own scheduled retry (if any) becomes a noop because the
  # ScheduleReinviteRetry action checks `pending_reinvite`, which we clear
  # on Dialog200OK's SuspendMedia path implicitly via the OnHold entry —
  # and the stale re-INVITE that our retry sends after waking will be
  # answered by OnHold's ReinviteReceived → 200 OK rule. This matches the
  # pre-fix semantic where both peers converge to OnHold on simultaneous
  # hold, now via RFC-compliant signalling rather than eager state commit.
  - role: "Both"
    state: "HoldPending"
    event:
      type: "ReinviteReceived"
    next_state: "OnHold"
    actions:
      - type: "NegotiateSDPAsUAS"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
      - type: "SuspendMedia"
      - type: "ClearPendingReinvite"
    publish:
      - "CallOnHold"
    description: "Simultaneous hold: accept peer's hold re-INVITE, commit OnHold"

  # RFC 3261 §14 — UAS receives re-INVITE on an established dialog, no
  # pending outgoing re-INVITE. Answer 200 OK with a negotiated SDP.
  - role: "Both"
    state: "Active"
    event:
      type: "ReinviteReceived"
    next_state: "Active"
    actions:
      - type: "NegotiateSDPAsUAS"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "UAS answers incoming re-INVITE (hold/resume/renegotiation)"

  - role: "Both"
    state: "OnHold"
    event:
      type: "ReinviteReceived"
    next_state: "OnHold"
    actions:
      - type: "NegotiateSDPAsUAS"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "UAS answers re-INVITE while on hold (peer-initiated resume)"

  # RFC 3311 / RFC 4028 §9 — UPDATE for session-timer refresh carries no
  # SDP, so we skip NegotiateSDPAsUAS. If a future UPDATE body is
  # present for mid-dialog modification, the executor has already
  # stashed it into session.remote_sdp; extending this transition to
  # renegotiate is a future enhancement.
  - role: "Both"
    state: "Active"
    event:
      type: "UpdateReceived"
    next_state: "Active"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "UAS answers UPDATE (session-timer refresh) while Active"

  - role: "Both"
    state: "OnHold"
    event:
      type: "UpdateReceived"
    next_state: "OnHold"
    actions:
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    description: "UAS answers UPDATE while on hold"

  # RFC 3261 §14.1 — 491 Request Pending on a re-INVITE (glare).
  # Sleep a random interval and retry the pending hold/resume/SDP-update.
  # Transition stays in Active / OnHold so the dialog isn't torn down.
  - role: "Both"
    state: "Active"
    event:
      type: "ReinviteGlare"
    next_state: "Active"
    actions:
      - type: "ScheduleReinviteRetry"
    description: "491 Request Pending — retry re-INVITE after backoff (Active)"

  - role: "Both"
    state: "OnHold"
    event:
      type: "ReinviteGlare"
    next_state: "OnHold"
    actions:
      - type: "ScheduleReinviteRetry"
    description: "491 Request Pending — retry re-INVITE after backoff (OnHold)"

  - role: "Both"
    state: "Resuming"
    event:
      type: "ReinviteGlare"
    next_state: "Resuming"
    actions:
      - type: "ScheduleReinviteRetry"
    description: "491 Request Pending — retry re-INVITE after backoff (Resuming)"

  - role: "Both"
    state: "HoldPending"
    event:
      type: "ReinviteGlare"
    next_state: "HoldPending"
    actions:
      - type: "ScheduleReinviteRetry"
    description: "491 Request Pending — retry re-INVITE after backoff (HoldPending)"

  # RFC 3261 §8.1.3.4 — 3xx redirect. Tear down the in-flight dialog/media
  # and follow the next Contact URI via RetryWithContact. Max 5 hops is
  # enforced inside the action.
  - role: "UAC"
    state: "Initiating"
    event:
      type: "Dialog3xxRedirect"
    next_state: "Initiating"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
      - type: "CreateMediaSession"
      - type: "GenerateLocalSDP"
      - type: "RetryWithContact"
    description: "Follow 3xx redirect to next Contact URI"

  # Error handling - call failures
  - role: "Both"
    state: "Initiating"
    event:
      type: "Dialog4xxFailure"
    next_state: "Failed"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
      # RFC 3515 §2.4.5 — on a transfer leg, surface the failure back to
      # the transferor via a final sipfrag NOTIFY. No-op for
      # non-transfer sessions.
      - type: "SendTransferNotifyFailure"
      # SIP_API_DESIGN_2 §7.3 invariant #2 — final response on the
      # INVITE; release the stash even though the call failed.
      - type: "ClearPendingINVITEOptions"
    publish:
      - "CallFailed"
    description: "Call failed with 4xx error"

  - role: "Both"
    state: "Initiating"
    event:
      type: "Dialog5xxFailure"
    next_state: "Failed"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
      - type: "SendTransferNotifyFailure"
      - type: "ClearPendingINVITEOptions"
    publish:
      - "CallFailed"
    description: "Call failed with 5xx error"

  - role: "Both"
    state: "Initiating"
    event:
      type: "DialogTimeout"
    next_state: "Failed"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
      - type: "ClearPendingINVITEOptions"
    publish:
      - "CallFailed"
    description: "INVITE timed out before a provisional response; do not send CANCEL"

  # Cancel outgoing call. RFC 3261 9.1 allows CANCEL only after a
  # provisional response. Before that, record intent and let either
  # a provisional response trigger CANCEL or a final response/timeout resolve
  # the INVITE transaction.
  - role: "UAC"
    state: "Initiating"
    event:
      type: "CancelCall"
    next_state: "CancelPending"
    description: "Cancel requested before provisional response; wait until CANCEL is legal"

  - role: "UAC"
    state: "Initiating"
    event:
      type: "HangupCall"
    next_state: "CancelPending"
    description: "Hangup requested before provisional response; wait until CANCEL is legal"

  - role: "UAC"
    state: "CancelPending"
    event:
      type: "Dialog180Ringing"
    next_state: "Cancelling"
    actions:
      - type: "SendCANCELWithOptions"
      - type: "CleanupMedia"
    description: "Provisional response arrived after pending cancel; send CANCEL"

  - role: "UAC"
    state: "CancelPending"
    event:
      type: "Dialog183SessionProgress"
    next_state: "Cancelling"
    actions:
      - type: "SendCANCELWithOptions"
      - type: "CleanupMedia"
    description: "Early-media provisional arrived after pending cancel; send CANCEL without starting media"

  - role: "UAC"
    state: "CancelPending"
    event:
      type: "Dialog200OK"
    next_state: "Cancelling"
    actions:
      - type: "StoreRemoteSDP"
      - type: "SendACK"
      - type: "SendBYE"
      - type: "CleanupMedia"
    description: "Late 200 OK won the race before CANCEL was legal; ACK then BYE without publishing CallEstablished"

  - role: "UAC"
    state: "CancelPending"
    event:
      type: "Dialog4xxFailure"
    next_state: "Cancelled"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Pending cancel resolved by final non-2xx response"

  - role: "UAC"
    state: "CancelPending"
    event:
      type: "Dialog5xxFailure"
    next_state: "Cancelled"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Pending cancel resolved by final 5xx response"

  - role: "UAC"
    state: "CancelPending"
    event:
      type: "Dialog6xxFailure"
    next_state: "Cancelled"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Pending cancel resolved by final 6xx response"

  - role: "UAC"
    state: "CancelPending"
    event:
      type: "DialogTimeout"
    next_state: "Cancelled"
    actions:
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Pending cancel resolved by INVITE timeout"

  - role: "UAC"
    state: "Ringing"
    event:
      type: "CancelCall"
    next_state: "Cancelling"
    actions:
      - type: "SendCANCELWithOptions"
      - type: "CleanupMedia"
    description: "Cancel ringing call; wait for final INVITE response"

  # `SessionHandle::hangup()` is the single user-facing "stop this call"
  # API. It fires `HangupCall`; this block routes it to the CANCEL wire
  # path when appropriate, following RFC 3261 9.1: CANCEL is only sent
  # once a provisional response has been received. Before that, the
  # Initiating/HangupCall transition above records cancel intent.

  # Ringing (180 or reliable 18x received): CANCEL is RFC-correct.
  - role: "UAC"
    state: "Ringing"
    event:
      type: "HangupCall"
    next_state: "Cancelling"
    actions:
      - type: "SendCANCELWithOptions"
      - type: "CleanupMedia"
    description: "Hangup while ringing; send CANCEL and wait for final INVITE response"

  - role: "UAC"
    state: "EarlyMedia"
    event:
      type: "CancelCall"
    next_state: "Cancelling"
    actions:
      - type: "SendCANCELWithOptions"
      - type: "CleanupMedia"
    description: "Cancel during early media; send CANCEL and wait for final INVITE response"

  # EarlyMedia (reliable 183 path): provisional already received, dialog
  # still in Early state; CANCEL is appropriate.
  - role: "UAC"
    state: "EarlyMedia"
    event:
      type: "HangupCall"
    next_state: "Cancelling"
    actions:
      - type: "SendCANCELWithOptions"
      - type: "CleanupMedia"
    description: "Hangup during early media; send CANCEL and wait for final INVITE response"

  - role: "UAC"
    state: "Cancelling"
    event:
      type: "Dialog487RequestTerminated"
    next_state: "Cancelled"
    actions:
      - type: "CleanupDialog"
    publish:
      - "CallCancelled"
    description: "CANCEL completed with 487 Request Terminated"

  - role: "UAC"
    state: "Cancelling"
    event:
      type: "Dialog200OK"
    next_state: "Cancelling"
    actions:
      - type: "StoreRemoteSDP"
      - type: "SendACK"
      - type: "SendBYE"
      - type: "CleanupMedia"
    description: "Late 200 OK after CANCEL; ACK then BYE without publishing CallEstablished"

  - role: "UAC"
    state: "Cancelling"
    event:
      type: "DialogTerminated"
    next_state: "Cancelled"
    actions:
      - type: "CleanupDialog"
    publish:
      - "CallCancelled"
    description: "Late-answer BYE cleanup completed after cancellation"

  - role: "UAC"
    state: "Cancelling"
    event:
      type: "DialogTimeout"
    next_state: "Cancelled"
    actions:
      - type: "CleanupDialog"
    publish:
      - "CallCancelled"
    description: "Cancellation completed by transaction timeout"

  # Receive CANCEL for incoming call
  - role: "UAS"
    state: "Ringing"
    event:
      type: "DialogCANCEL"
    next_state: "Cancelled"
    actions:
      - type: "SendSIPResponse"
        code: 487
        reason: "Request Terminated"
      - type: "CleanupDialog"
      - type: "CleanupMedia"
    publish:
      - "CallCancelled"
    description: "Incoming call cancelled"

  # ==========================================
  # Registration Transitions
  # ==========================================

  # Start registration from Idle
  - role: "Both"
    state: "Idle"
    event:
      type: "StartRegistration"
    next_state: "Registering"
    actions:
      - type: "CreateDialog"
      - type: "SendREGISTER"
    publish:
      - "RegistrationStarted"
    description: "Start registration process"

  # Registration successful
  - role: "Both"
    state: "Registering"
    event:
      type: "Registration200OK"
    next_state: "Registered"
    conditions:
      is_registered: true
    publish:
      - "RegistrationSuccess"
    description: "Registration successful"

  # Registration failed
  - role: "Both"
    state: "Registering"
    event:
      type: "RegistrationFailed"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    publish:
      - "RegistrationFailed"
    description: "Registration failed"

  # Unregister request
  - role: "Both"
    state: "Registered"
    event:
      type: "UnregisterRequest"
    next_state: "Unregistering"
    actions:
      - type: "SendREGISTER"
    publish:
      - "UnregistrationStarted"
    description: "Start unregistration"

  # Unregistration complete
  - role: "Both"
    state: "Unregistering"
    event:
      type: "Dialog200OK"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    conditions:
      is_registered: false
    publish:
      - "UnregistrationComplete"
    description: "Unregistration complete"

  # ==========================================
  # Subscription/NOTIFY Transitions
  # ==========================================

  # Start subscription from Idle
  - role: "Both"
    state: "Idle"
    event:
      type: "StartSubscription"
    next_state: "Subscribing"
    actions:
      - type: "CreateDialog"
      - type: "SendSUBSCRIBE"
    publish:
      - "SubscriptionStarted"
    description: "Start subscription"

  # Subscription accepted
  - role: "Both"
    state: "Subscribing"
    event:
      type: "SubscriptionAccepted"
    next_state: "Subscribed"
    publish:
      - "SubscriptionActive"
    description: "Subscription accepted"

  # Receive NOTIFY in subscribed state
  - role: "Both"
    state: "Subscribed"
    event:
      type: "ReceiveNOTIFY"
    next_state: "Subscribed"
    actions:
      - type: "ProcessNOTIFY"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    publish:
      - "NotifyReceived"
    description: "Process NOTIFY message"

  # Subscription failed
  - role: "Both"
    state: "Subscribing"
    event:
      type: "SubscriptionFailed"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    publish:
      - "SubscriptionFailed"
    description: "Subscription failed"

  # Unsubscribe
  - role: "Both"
    state: "Subscribed"
    event:
      type: "UnsubscribeRequest"
    next_state: "Idle"
    actions:
      - type: "SendSUBSCRIBE"
      - type: "CleanupDialog"
    publish:
      - "UnsubscribeComplete"
    description: "Unsubscribe"

  # ==========================================
  # MESSAGE Handling Transitions
  # ==========================================

  # Send MESSAGE from Idle
  - role: "Both"
    state: "Idle"
    event:
      type: "SendMessage"
    next_state: "Messaging"
    actions:
      - type: "CreateDialog"
      - type: "SendMESSAGE"
    publish:
      - "MessageSent"
    description: "Send SIP MESSAGE"

  # MESSAGE sent successfully
  - role: "Both"
    state: "Messaging"
    event:
      type: "MessageDelivered"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    publish:
      - "MessageDelivered"
    description: "MESSAGE delivered"

  # MESSAGE sending failed
  - role: "Both"
    state: "Messaging"
    event:
      type: "MessageFailed"
    next_state: "Idle"
    actions:
      - type: "CleanupDialog"
    publish:
      - "MessageDeliveryFailed"
    description: "MESSAGE delivery failed"

  # Receive MESSAGE in Idle
  - role: "Both"
    state: "Idle"
    event:
      type: "ReceiveMESSAGE"
    next_state: "Idle"
    actions:
      - type: "ProcessMESSAGE"
      - type: "SendSIPResponse"
        code: 200
        reason: "OK"
    publish:
      - "MessageReceived"
    description: "Receive SIP MESSAGE"

  # ========================================
  # Registration Flow (UAC)
  # ========================================
  
  # Start registration
  - role: "UAC"
    state: "Idle"
    event:
      type: "StartRegistration"
    next_state: "Registering"
    actions:
      - type: "SendREGISTER"
    description: "Initiate SIP registration with server"

  # Registration successful (200 OK without challenge)
  - role: "UAC"
    state: "Registering"
    event:
      type: "Registration200OK"
    next_state: "Registered"
    conditions:
      IsRegistered: true
    publish:
      - "RegistrationSuccess"
    description: "Registration completed successfully"

  # REGISTER challenged with 401/407 (RFC 3261 §22.2). Shares the
  # `AuthRequired` event with INVITE auth — the `Registering` state
  # disambiguates this from the INVITE retry transition. Single self-loop:
  # parse + retry in one step; dialog-core's event_hub converter emits
  # `AuthRequired` directly, bypassing the old `Registration401` →
  # `Authenticating` → `RetryRegistration` → `Registering` three-step path.
  - role: "UAC"
    state: "Registering"
    event:
      type: "AuthRequired"
    next_state: "Registering"
    actions:
      - type: "StoreAuthChallenge"
      - type: "SendREGISTERWithAuth"
    description: "REGISTER auth retry (RFC 3261 §22.2)"

  # SIP_API_DESIGN_2 R2 — auth retry for non-INVITE / non-REGISTER
  # methods (BYE, REFER, NOTIFY, INFO, UPDATE, MESSAGE, OPTIONS,
  # SUBSCRIBE). The shared `AuthRequired` event arrives with `method`
  # populated from the response `CSeq:`; `SendRequestWithAuth` reads
  # that field (stashed on `session.pending_auth_method` by the
  # executor) plus the matching `pending_<method>_options` stash to
  # re-issue the request with the computed Authorization. Two rows:
  # one for in-dialog (`Active`), one for out-of-dialog (`Idle`).
  # `Initiating` (INVITE) and `Registering` (REGISTER) are handled by
  # their dedicated rows above; the state discriminator keeps the
  # paths from colliding.
  - role: "UAC"
    state: "Active"
    event:
      type: "AuthRequired"
    next_state: "Active"
    actions:
      - type: "StoreAuthChallenge"
      - type: "SendRequestWithAuth"
    description: "In-dialog request auth retry (BYE/REFER/NOTIFY/INFO/UPDATE)"

  - role: "UAC"
    state: "Idle"
    event:
      type: "AuthRequired"
    next_state: "Idle"
    actions:
      - type: "StoreAuthChallenge"
      - type: "SendRequestWithAuth"
    description: "Out-of-dialog request auth retry (SUBSCRIBE/MESSAGE/OPTIONS)"

  # Authentication successful
  - role: "UAC"
    state: "Authenticating"
    event:
      type: "Registration200OK"
    next_state: "Registered"
    conditions:
      IsRegistered: true
    publish:
      - "RegistrationSuccess"
    description: "Registration with authentication successful"

  # Registration failed (403, 404, etc.)
  - role: "UAC"
    state: "Registering"
    event:
      type: "RegistrationFailed"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "RegistrationFailed"
    description: "Registration failed"

  # Authentication failed
  - role: "UAC"
    state: "Authenticating"
    event:
      type: "RegistrationFailed"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "RegistrationFailed"
    description: "Authentication failed"

  # Refresh registration (from Registered state)
  - role: "UAC"
    state: "Registered"
    event:
      type: "RefreshRegistration"
    next_state: "Registering"
    actions:
      - type: "SendREGISTER"
    description: "Refresh registration before expiry"

  # Unregister (expires=0)
  - role: "UAC"
    state: "Registered"
    event:
      type: "StartUnregistration"
    next_state: "Unregistering"
    actions:
      - type: "SendUnREGISTER"
    description: "Initiate unregistration (expires=0)"

  # Unregistration successful
  - role: "UAC"
    state: "Unregistering"
    event:
      type: "Unregistration200OK"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "UnregistrationSuccess"
    description: "Unregistration completed"

  # Unregistration failed (still clear local state)
  - role: "UAC"
    state: "Unregistering"
    event:
      type: "UnregistrationFailed"
    next_state: "Idle"
    conditions:
      IsRegistered: false
    publish:
      - "UnregistrationFailed"
    description: "Unregistration failed but cleared local state"

  # ─────────────────────────────────────────────────────────────────────
  # SIP_API_DESIGN_2 §7.1 — builder-staged outbound dispatch.
  #
  # Each row routes the matching `SendOutbound<METHOD>` event (queued by
  # the builder's `.send()` after `stage_outbound_options` populates the
  # stash) to the `Send<METHOD>WithOptions` action. The action handler
  # drains `pending_<method>_options` with `.take()` and dispatches via
  # the dialog-adapter mirror. Same-state transitions (no `next_state`)
  # preserve the call's lifecycle — these events are not state-changing,
  # only request-emitting.
  #
  # In-dialog requests (BYE, REFER, NOTIFY, INFO, UPDATE, re-INVITE) fire
  # from `Active`. Out-of-dialog requests (INVITE, REGISTER, SUBSCRIBE,
  # MESSAGE, OPTIONS) fire from `Idle`. CANCEL fires from `Initiating`.
  # ─────────────────────────────────────────────────────────────────────

  - role: "UAC"
    state: "Idle"
    event:
      type: "SendOutboundInvite"
    next_state: "Initiating"
    actions:
      - type: "CreateDialog"
      - type: "CreateMediaSession"
      - type: "GenerateLocalSDP"
      - type: "SendINVITEWithOptions"
    publish:
      - "SessionCreated"
    description: "Builder-staged INVITE dispatch (full setup: dialog + media + SDP + WithOptions)"

  - role: "UAC"
    state: "Active"
    event:
      type: "SendOutboundReInvite"
    actions:
      - type: "SendReINVITEWithOptions"
    description: "Builder-staged re-INVITE dispatch"

  - role: "UAS"
    state: "Active"
    event:
      type: "SendOutboundReInvite"
    actions:
      - type: "SendReINVITEWithOptions"
    description: "Builder-staged re-INVITE dispatch (UAS)"

  - role: "UAC"
    state: "Active"
    event:
      type: "SendOutboundBye"
    actions:
      - type: "SendBYEWithOptions"
    description: "Builder-staged BYE dispatch"

  - role: "UAS"
    state: "Active"
    event:
      type: "SendOutboundBye"
    actions:
      - type: "SendBYEWithOptions"
    description: "Builder-staged BYE dispatch (UAS)"

  - role: "UAC"
    state: "Initiating"
    event:
      type: "SendOutboundCancel"
    actions:
      - type: "SendCANCELWithOptions"
    description: "Builder-staged CANCEL dispatch"

  - role: "UAC"
    state: "Active"
    event:
      type: "SendOutboundRefer"
    actions:
      - type: "SendREFERWithOptions"
    description: "Builder-staged REFER dispatch"

  - role: "UAS"
    state: "Active"
    event:
      type: "SendOutboundRefer"
    actions:
      - type: "SendREFERWithOptions"
    description: "Builder-staged REFER dispatch (UAS)"

  - role: "UAC"
    state: "Active"
    event:
      type: "SendOutboundNotify"
    actions:
      - type: "SendNOTIFYWithOptions"
    description: "Builder-staged NOTIFY dispatch"

  - role: "UAS"
    state: "Active"
    event:
      type: "SendOutboundNotify"
    actions:
      - type: "SendNOTIFYWithOptions"
    description: "Builder-staged NOTIFY dispatch (UAS)"

  - role: "UAC"
