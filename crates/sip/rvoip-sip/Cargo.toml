[package]
name = "rvoip-sip"
version.workspace = true  # 0.2.2 — beta-tier; inherits from [workspace.package]
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "SIP umbrella for RVoIP: api/* (UnifiedCoordinator, StreamPeer, CallbackPeer, Endpoint), server/* (B2BUA helpers), adapter/* (rvoip-core::ConnectionAdapter impl)"
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
categories.workspace = true
keywords.workspace = true
# The SIP sub-crates (sip-core / sip-transport / sip-dialog / sip-proxy /
# sip-registrar) and the fuzz harness are now SIBLINGS of this package
# under crates/sip/ — no longer nested here, so no `exclude` is needed to
# keep them out of the published `rvoip-sip` .crate.

# docs.rs build configuration. `all-features` is deliberately avoided: the
# `tokio-console` feature requires `RUSTFLAGS=--cfg tokio_unstable` and `dhat`
# swaps the global allocator — neither of which docs.rs sets. These two match
# the crate's own rustdoc gate in scripts/beta_gate.sh so docs.rs renders the
# same feature-gated surface (TLS config, generated-validation).
[package.metadata.docs.rs]
features = ["generated-validation", "dev-insecure-tls"]

