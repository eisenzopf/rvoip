[dependencies]
# Core dependencies
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"
tracing = "0.1"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
futures = "0.3"
roxmltree = "0.20"

# RVoIP crates — sourced from [workspace.dependencies] so versions, paths,
# and crates.io publishing all stay coherent. Bare `path = "..."` form is
# rejected by `cargo publish`; do NOT regress to it.
rvoip-core.workspace = true
rvoip-infra-common.workspace = true
rvoip-sip-dialog.workspace = true
rvoip-sip-proxy.workspace = true
rvoip-sip-transport.workspace = true
rvoip-media-core.workspace = true
rvoip-sip-core.workspace = true
rvoip-rtp-core.workspace = true
rvoip-core-traits.workspace = true
ipnet = "2.12"
# RFC 4568 SDES — base64 encoding of `a=crypto: inline:` master keys.
base64 = "0.22"
rvoip-auth-core.workspace = true
rvoip-sip-registrar.workspace = true

# State management
lazy_static = "1.4"
arc-swap = "1.7"

# Collections
dashmap = "6"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Audio handling (for API compatibility)
hound = "3.5"
bytes = "1.5"

# Utility
uuid = { version = "1.4", features = ["v4"] }
rand = "0.8"
# RFC 3261 §8.1 — state-machine `Action` variant reflection for the YAML
# loader's drift-detection validation pass (see `state_table/yaml_loader.rs`
# `parse_action_by_name`).
strum = { version = "0.26", features = ["derive"] }

[dev-dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy = "0.15"
rvoip-sip-transport.workspace = true
rvoip-sip-registrar.workspace = true
# Repo-only auth provider fixtures. These are intentionally path-only
# dev-dependencies so Cargo strips them from the normalized crates.io manifest;
# several extension crates are still alpha and not part of this beta train.
rvoip-users-core = { path = "../../identity/users-core", features = ["auth-core"] }
rvoip-keycloak = { path = "../../extensions/rvoip-keycloak" }
rvoip-redis = { path = "../../extensions/rvoip-redis" }
rvoip-audit = { path = "../../extensions/rvoip-audit" }
rvoip-oidc = { path = "../../extensions/rvoip-oidc" }
rvoip-ldap = { path = "../../extensions/rvoip-ldap" }
rvoip-scim = { path = "../../extensions/rvoip-scim" }
rvoip-saml = { path = "../../extensions/rvoip-saml" }
rvoip-webauthn = { path = "../../extensions/rvoip-webauthn" }
rvoip-ims-aka = { path = "../../extensions/rvoip-ims-aka" }
serial_test = { workspace = true }
tempfile = "3.14"
url = "2.5"
# Self-signed cert generation for the TLS-call integration test.
rcgen = "0.14"
# Tests that exercise SIP TLS need to install the rustls default crypto
# provider before the TLS code path runs (rustls 0.23 no longer picks one
# automatically when more than one provider feature is reachable).
rustls = { workspace = true }
clap = { workspace = true }
cpal = "0.15"
crossterm = "0.27"
ratatui = "0.26"
criterion = { workspace = true }
futures = { workspace = true }
proptest = { workspace = true }

# End-to-end benchmarks. See `crates/sip/rvoip-sip/docs/PROFILING.md`.
[[bench]]
name = "call_setup"
harness = false
[[bench]]
name = "registration_storm"
harness = false
[[bench]]
name = "dialog_steady_state"
harness = false
# Targeted create/find micro-benchmarks. Each hot path is measured
# side-by-side with a candidate replacement (RwLock vs ArcSwap, String
# vs Arc<str> DashMap keys) — see Scenario 8 in docs/PROFILING.md.
[[bench]]
name = "session_lookup_create"
harness = false

[features]
default = []
event-history = []
persistence = []
generated-validation = [
    "rvoip-sip-dialog/generated-validation",
    "rvoip-sip-core/generated-validation",
]
# Dev-only: exposes `Config::tls_insecure_skip_verify` and forwards to
# dialog-core's matching feature (which in turn forwards to
# sip-transport's). Production builds must omit this feature so `rustls`
# always validates server certs. Forwarded here on dialog-core only —
# session-core only depends on sip-transport as a dev-dependency, and
# feature chains via dev-deps don't participate in regular builds.
dev-insecure-tls = ["rvoip-sip-dialog/dev-insecure-tls"]
# Optional G.729A/G.729AB media support. Off by default.
g729 = ["rvoip-media-core/g729"]
# Heap profiling for `examples/profiling/dhat_*.rs`. Pulls in the dhat
# global allocator and turns the gated examples into compilable
# binaries. Off by default so `cargo build` / `cargo test` never see
# the allocator swap. The forwarded `rvoip-infra-common/no-global-allocator`
# suppresses mimalloc so the two `#[global_allocator]`s don't conflict.
# See `crates/sip/rvoip-sip/docs/PROFILING.md`.
dhat = ["dep:dhat", "rvoip-infra-common/no-global-allocator"]
# `console-subscriber` integration for the long-running profiling
# examples (`profiling_registration_storm`, `profiling_dialog_steady_state`).
# Requires `RUSTFLAGS="--cfg tokio_unstable"` at build time.
tokio-console = ["dep:console-subscriber"]
# Opt-in publically-reportable concurrency benchmark suite under
# tests/perf/. Pulls in hdrhistogram for latency percentiles and sysinfo
# for environment-block capture. Off by default so `cargo build` /
# `cargo test` are untouched. This feature intentionally does not compile
# media/RTP/memory diagnostic instrumentation into the hot path. See
# `crates/sip/rvoip-sip/docs/BENCHMARKING.md`.
perf-tests = [
    "dep:hdrhistogram",
    "dep:sysinfo",
]
# Targeted perf diagnostics. Enable only the specific instrumentation needed
# for an investigation run; beta headline performance gates use `perf-tests`
# alone.
perf-infra-memory-diagnostics = [
    "perf-tests",
    "rvoip-infra-common/memory-diagnostics",
]
perf-media-diagnostics = [
    "perf-tests",
    "rvoip-media-core/perf-diagnostics",
]
perf-media-memory-diagnostics = [
    "perf-tests",
    "rvoip-media-core/memory-diagnostics",
]
perf-rtp-memory-diagnostics = [
    "perf-tests",
    "rvoip-rtp-core/memory-diagnostics",
]
perf-call-setup-diagnostics = [
    "perf-tests",
]
# Perf-only allocator A/B switch. Used by `scripts/perf_soak_split.sh`
# with `RVOIP_PERF_SYSTEM_ALLOCATOR=1` to disable the mimalloc global
# allocator while leaving diagnostics and the soak harness unchanged.
perf-system-allocator = ["rvoip-infra-common/no-global-allocator"]

