name = "perf_transport_recovery"
path = "tests/perf/perf_transport_recovery.rs"
required-features = ["perf-tests"]
[[test]]
name = "perf_ai_agent_load"
path = "tests/perf/perf_ai_agent_load.rs"
required-features = ["perf-tests"]
[[test]]
name = "perf_contact_center_transfers"
path = "tests/perf/perf_contact_center_transfers.rs"
required-features = ["perf-tests"]
[[test]]
name = "perf_sipp_parity"
path = "tests/perf/perf_sipp_parity.rs"
required-features = ["perf-tests"]

# Profiling-only optional deps. Off by default; enabled via the `dhat`
# and `tokio-console` features. See `crates/sip/rvoip-sip/docs/PROFILING.md`.
[dependencies.dhat]
version = "0.3"
optional = true

[dependencies.console-subscriber]
version = "0.4"
optional = true

# perf-tests optional deps. Off by default; enabled via the `perf-tests`
# feature. These live in `[dependencies]` (not `[dev-dependencies]`)
# because Cargo does not allow `optional = true` on dev-dependencies —
# same idiom as `dhat` and `console-subscriber` above. They are pulled
# in only when the feature is enabled, so default builds are untouched.
[dependencies.hdrhistogram]
version = "7.5"
optional = true

[dependencies.sysinfo]
version = "0.31"
optional = true
