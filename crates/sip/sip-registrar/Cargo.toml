[package]
name = "rvoip-sip-registrar"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true
description = "SIP registrar (RFC 3261 §10): REGISTER processing, location service, contact bindings"

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"

# Data structures
dashmap = "6.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# 0.41+ required by RUSTSEC-2026-0194 / -0195 (quadratic attribute scan +
# unbounded namespace-allocation DoS in the reader, reachable via PIDF bodies).
quick-xml = { version = "0.41", features = ["serialize"] }

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "2.0"

# Internal dependencies
rvoip-infra-common.workspace = true
rvoip-sip-dialog.workspace = true
rvoip-auth-core.workspace = true

# UUID generation
uuid = { version = "1.5", features = ["v4", "serde"] }

[dev-dependencies]
