[package]
name = "rvoip-audio-core"
# Alpha-tier — held until the CallbackPeer integration is rewritten
# against the new rvoip-sip api/* surface. Was previously a non-member
# orphan referencing the deleted rvoip-client-core; the optional
# `client-integration` feature has been removed, and the rvoip-sip dep
# is now the only SIP entry point. See plan ~/.claude/plans/
# we-are-preparing-to-abstract-marshmallow.md.
version = "0.1.0-alpha.1"
publish = false
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

# Crate-specific description
description = "Audio device management and format conversion for SIP-client developers using rvoip-sip's CallbackPeer API (alpha)"

# ✨ INHERIT LINTS FROM WORKSPACE
[lints]
workspace = true

[dependencies]
# Internal: integrates with rvoip-sip's CallbackPeer / Endpoint surface
# (see crates/sip/rvoip-sip/examples/callback_peer/).
rvoip-sip.workspace = true
rvoip-rtp-core.workspace = true

# Audio device access
cpal = { version = "0.15", optional = true }

# Audio processing and format conversion
dasp = { version = "0.11", features = ["std", "signal", "interpolate", "interpolate-linear"], optional = true }

# Async runtime and utilities
tokio = { version = "1.0", features = ["full"] }

# Data structures and utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
serde = { version = "1.0", features = ["derive"] }

# Logging and error handling
thiserror = "1.0"

# Time and synchronization
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
tracing-test = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serial_test = "3.1"

[features]
default = ["format-conversion", "device-cpal"]

# Device backend features
device-cpal = ["cpal"]
device-mock = []
test-audio = ["device-mock"]

# Format conversion features
format-conversion = ["dasp"]
format-advanced = ["format-conversion"]

# NOTE: the former `client-integration` feature was removed when the
# deleted `rvoip-client-core` dep was dropped. The replacement is a
# direct rvoip-sip integration via CallbackPeer (TODO — tracked in the
# audio-core promotion section of the release plan).

# Audio processing features (future)
processing-aec = []
processing-agc = []
processing-noise = []
processing-vad = []
processing-all = ["processing-aec", "processing-agc", "processing-noise", "processing-vad"]

# All features
full = ["processing-all"]

# Example configurations
# Examples will be implemented in future phases 