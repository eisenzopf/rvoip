[package]
name = "rvoip-sip-core"
# 🎯 INHERIT VERSION AND METADATA FROM WORKSPACE!
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

# Crate-specific description
description = "SIP protocol implementation for the rvoip stack"

# ✨ INHERIT LINTS FROM WORKSPACE
[lints]
workspace = true

# Features
[features]
default = ["sdp"]  # Include sdp in the default features
generated-validation = []  # Heavy generated-message serialize/strict-parse verifier for tests/dev diagnostics
lenient_parsing = []  # More lenient parsing for torture tests
sdp = []  # Session Description Protocol support

[dependencies]
# Workspace dependencies
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
bytes.workspace = true
uuid.workspace = true
tracing.workspace = true
chrono.workspace = true
rand.workspace = true
log.workspace = true

# Crate-specific dependencies not in workspace
base64.workspace = true
nom.workspace = true
ordered-float.workspace = true

[dev-dependencies]
criterion.workspace = true

# Integration tests configuration
[[test]]
name = "torture_tests"
path = "tests/rfc_compliance/torture_test.rs"
required-features = ["lenient_parsing"]

[[test]]
name = "parser"
path = "tests/parser_tests.rs"

[[test]]
name = "generated_message_compliance"
path = "tests/generated_message_compliance.rs"
required-features = ["generated-validation"]

# Performance benchmarks. Run with `cargo bench -p rvoip-sip-core`. See
# `crates/sip/rvoip-sip/docs/PROFILING.md` for the broader profiling workflow.
[[bench]]
name = "parse"
harness = false

[[bench]]
name = "serialize"
harness = false

[[bench]]
name = "headers"
harness = false
