[package]
name = "rvoip-sip-transport"
# 🎯 INHERIT VERSION AND METADATA FROM WORKSPACE!
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

# Crate-specific description
description = "Transport layer for SIP - UDP, TCP, TLS support"

# ✨ INHERIT LINTS FROM WORKSPACE
[lints]
workspace = true

[dependencies]
# 🎯 INTERNAL CRATES
rvoip-sip-core.workspace = true
rvoip-infra-common.workspace = true

# External dependencies from workspace
tokio.workspace = true
async-trait.workspace = true
thiserror.workspace = true
anyhow.workspace = true
bytes.workspace = true
tracing.workspace = true
socket2.workspace = true

# TLS support
tokio-rustls = { workspace = true, optional = true }
# `dangerous_configuration` is required for the dev-only
# `TlsClientConfig::insecure_skip_verify` cert verifier. Production
# default validation does not depend on it.
rustls = { workspace = true, optional = true }
rustls-pemfile = { version = "2.0", optional = true }
# Client cert verification: prefer system trust store, fall back to a
# bundled root set. Both pinned to versions compatible with rustls 0.23.
rustls-native-certs = { version = "0.8", optional = true }
webpki-roots = { version = "0.26", optional = true }

# WebSocket support
tokio-tungstenite = { workspace = true, optional = true }
http = { version = "1", optional = true }

# RFC 3263 NAPTR/SRV/A resolver (opt-in via `dns` feature).
# `HickoryResolver` and the `hickory` submodule are gated on this.
hickory-resolver = { workspace = true, optional = true }
fastrand = { workspace = true, optional = true }

# Add futures-util dependency
futures-util = "0.3"

[features]
default = ["udp", "tcp", "tls", "ws", "wss"]
udp = []
tls = ["dep:tokio-rustls", "dep:rustls", "dep:rustls-pemfile", "dep:rustls-native-certs", "dep:webpki-roots"]
tcp = []
ws = ["dep:tokio-tungstenite", "dep:http"]
# WebSocket Secure (WSS) server-side accept. Requires the same rustls
# plumbing as the regular TLS transport. Plain `ws` still works when
# this is disabled — only WSS bind/accept paths gate on `wss`.
wss = ["ws", "tls"]
# Dev-only: compile the accept-all-certs TLS client verifier. NEVER
# enable in production — the `TlsClientConfig::insecure_skip_verify` flag
# has no effect without it. Gated so production builds physically cannot
# ship with cert validation disabled.
dev-insecure-tls = ["tls"]
# RFC 3263 reference resolver implementation (`HickoryResolver`). The
# `Resolver` trait itself is always compiled; only the hickory-backed
# impl + NAPTR/SRV/A ladder lives behind this flag so consumers that
# bring their own resolver can opt out of `hickory-resolver` /
# `fastrand`.
dns = ["dep:hickory-resolver", "dep:fastrand"]

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tracing-subscriber = { workspace = true }
criterion = { workspace = true }
# Generate self-signed certs in TLS handshake tests.
rcgen = "0.14"
tempfile = "3"
# Authoritative DNS fixture for the RFC 3263 end-to-end test.
hickory-server = "0.26.1"
hickory-proto = "0.26.1"
fastrand = { workspace = true }

[[test]]
name = "resolver_hickory_e2e"
path = "tests/resolver_hickory_e2e.rs"
required-features = ["dns"]

# Performance benchmarks. See `crates/sip/rvoip-sip/docs/PROFILING.md`.
[[bench]]
name = "udp_loopback"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
