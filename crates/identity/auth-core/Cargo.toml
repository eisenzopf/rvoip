[package]
name = "rvoip-auth-core"
version.workspace = true  # 0.2.2 — beta-tier; inherits from [workspace.package]
edition.workspace = true
authors.workspace = true
description = "OAuth2 and token-based authentication for RVoIP services"
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"

# HTTP client for OAuth2 flows
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "http2", "charset"] }

# JWT handling
jsonwebtoken = "9.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# URL handling
url = "2.5"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Caching
moka = { version = "0.12", features = ["future"] }

# Cryptography
ring = "0.17"
base64 = "0.22"
subtle = "2.6"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"

# SIP Digest authentication
md5 = "0.7"
sha2 = "0.10"
hex = "0.4"
rand = "0.8"

# Internal dependencies
rvoip-infra-common.workspace = true
# V2.A — depend on the trait-only crate, not rvoip-core itself.
# This is what breaks the rvoip-core → rvoip-vcon → rvoip-auth-core →
# rvoip-core cycle so rvoip-core can take an optional rvoip-vcon dep
# for the `vcon-signing` feature.
rvoip-core-traits.workspace = true

# uuid (used by bearer_stub for the throwaway JWK key id)
uuid = { version = "1.7", features = ["v4"] }

[dev-dependencies]
mockito = "1.4"
wiremock = "0.6"
tokio-test = "0.4"
