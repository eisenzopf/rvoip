[package]
name = "rvoip-websocket"
version = "0.1.1"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true
description = "rvoip-core ConnectionAdapter implementation over WebSocket (signaling) + co-located WebRTC PeerConnection (media) for the UCTP application protocol"

[features]
default = []
media-webrtc = ["dep:rvoip-webrtc"]
wss = ["dep:tokio-rustls", "dep:rustls", "tokio-tungstenite/rustls-tls-webpki-roots"]

[dependencies]
rvoip-core.workspace = true
rvoip-uctp.workspace = true
rvoip-auth-core.workspace = true
rvoip-webrtc = { workspace = true, optional = true }

tokio = { workspace = true }
async-trait.workspace = true
futures.workspace = true
dashmap.workspace = true
parking_lot.workspace = true

bytes.workspace = true
chrono.workspace = true
serde.workspace = true
serde_json.workspace = true

tokio-tungstenite = { workspace = true }
tokio-rustls = { workspace = true, optional = true }
rustls = { workspace = true, optional = true }
url = "2"

tracing.workspace = true
metrics.workspace = true

thiserror.workspace = true

[[test]]
name = "media_bridge_loopback"
required-features = ["media-webrtc"]

[[test]]
name = "ws_bridge_flow"
required-features = ["media-webrtc"]

[[test]]
name = "ws_envelope_sdp_bridge"
required-features = ["media-webrtc"]

[[test]]
name = "trickle_ice"
required-features = ["media-webrtc"]

[[test]]
name = "wss_loopback"
required-features = ["wss"]

[dev-dependencies]
rvoip-webrtc.workspace = true
rustls.workspace = true
tokio = { workspace = true, features = ["full", "test-util"] }
tracing-subscriber.workspace = true
uuid = { workspace = true, features = ["v4"] }

[lints]
workspace = true
