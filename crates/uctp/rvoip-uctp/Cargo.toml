[package]
name = "rvoip-uctp"
version = "0.1.2"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true
description = "UCTP (Universal Conversation Transport Protocol) — envelopes, state machine, capability negotiation, and substrate helpers shared by rvoip-quic and rvoip-webtransport"

[features]
# Disables certificate verification on the client side. For tests and demos
# only; never enable in production builds.
dev-dangerous = []

[dependencies]
# Workspace internal
rvoip-core.workspace = true
rvoip-auth-core.workspace = true

# Async runtime + concurrency primitives
tokio = { workspace = true }
tokio-util.workspace = true
async-trait.workspace = true
futures.workspace = true
dashmap.workspace = true
parking_lot.workspace = true

# Wire encoding + protocol
serde.workspace = true
serde_json.workspace = true
bytes.workspace = true
chrono.workspace = true
uuid.workspace = true

# Substrate
quinn.workspace = true
rustls.workspace = true
rustls-pemfile.workspace = true
rcgen.workspace = true

# Observability
tracing.workspace = true
metrics.workspace = true

# Errors
thiserror.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tracing-subscriber.workspace = true

# Phase 4 demo + bridge_smoke test consume the SIP family + adapter crates.
# Forward dev-deps: path-only (no version) so `cargo publish` strips them from
# the published manifest rather than requiring them on crates.io. See rvoip-core.
rvoip-quic = { path = "../rvoip-quic" }
rvoip-webtransport = { path = "../rvoip-webtransport" }
rvoip-websocket = { path = "../rvoip-websocket" }
rvoip-sip = { path = "../../sip/rvoip-sip" }
rvoip-media-core.workspace = true
url = "2"

# JWT validator integration test (plan C4 prelude).
jsonwebtoken = "9.3"

# Gap plan §5.2 v1 punch list — sig9421_gate.rs test signs envelopes
# directly with Ed25519 + base64 to drive the coordinator's verify
# gate end-to-end.
ring = { workspace = true }
base64 = { workspace = true }

# Gap plan §3.2 v1 punch list — orchestrator_bridge.rs example writes
# the demo cert's SPKI fingerprint to /tmp/uctp_demo_cert.spki so the
# Playwright wt_smoke.spec.mjs can pin it via Chromium's
# --ignore-certificate-errors-spki-list flag.
x509-parser = "0.18"
sha2 = { workspace = true }

[lints]
workspace = true

# Phase 4 demo binaries — see examples/uctp_to_sip_bridge/README.md
[[example]]
name = "orchestrator_bridge"
path = "examples/uctp_to_sip_bridge/orchestrator_bridge.rs"

[[example]]
name = "uctp_agent_quic"
path = "examples/uctp_to_sip_bridge/uctp_agent_quic.rs"

[[example]]
name = "uctp_agent_wt"
path = "examples/uctp_to_sip_bridge/uctp_agent_wt.rs"

[[example]]
name = "uctp_agent_ws"
path = "examples/uctp_to_sip_bridge/uctp_agent_ws.rs"

[[example]]
name = "sip_caller"
path = "examples/uctp_to_sip_bridge/sip_caller.rs"
