[package]
name = "rvoip-session-core-v3"
version = "0.1.0"
edition = "2021"
authors = ["RVoIP Contributors"]
description = "State table-based session coordination layer for RVoIP"
license = "MIT OR Apache-2.0"

# Getting started
[[example]]
name = "hello"
path = "examples/getting_started/hello.rs"

# StreamPeer examples (sequential / client-side)
[[example]]
name = "streampeer_audio"
path = "examples/streampeer/audio.rs"
[[example]]
name = "streampeer_dtmf"
path = "examples/streampeer/dtmf.rs"
[[example]]
name = "streampeer_hold_resume"
path = "examples/streampeer/hold_resume.rs"
[[example]]
name = "streampeer_registration"
path = "examples/streampeer/registration.rs"
[[example]]
name = "streampeer_blind_transfer"
path = "examples/streampeer/blind_transfer.rs"

# CallbackPeer examples (reactive / server-side)
[[example]]
name = "callbackpeer_auto_answer"
path = "examples/callbackpeer/auto_answer.rs"
[[example]]
name = "callbackpeer_closure"
path = "examples/callbackpeer/closure.rs"
[[example]]
name = "callbackpeer_routing"
path = "examples/callbackpeer/routing.rs"
[[example]]
name = "callbackpeer_ivr"
path = "examples/callbackpeer/ivr.rs"
[[example]]
name = "callbackpeer_queue"
path = "examples/callbackpeer/queue.rs"
[[example]]
name = "callbackpeer_custom"
path = "examples/callbackpeer/custom.rs"

# Advanced / multi-peer scenarios
[[example]]
name = "advanced_concurrent_calls"
path = "examples/advanced/concurrent_calls.rs"
[[example]]
name = "advanced_registrar_server"
path = "examples/advanced/registrar_server.rs"


[dependencies]
# Core dependencies
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"
tracing = "0.1"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
bincode = "1.3"
futures = "0.3"

# RVoIP crates - using actual package names
rvoip-infra-common = { path = "../infra-common" }
rvoip-dialog-core = { path = "../dialog-core" }
rvoip-media-core = { path = "../media-core" }
rvoip-sip-core = { path = "../sip-core" }
rvoip-rtp-core = { path = "../rtp-core" }
rvoip-auth-core = { path = "../auth-core" }
rvoip-registrar-core = { path = "../registrar-core" }

# State management
lazy_static = "1.4"
once_cell = "1.19"
arc-swap = "1.7"

# Collections
indexmap = "2.2"
dashmap = "5.5"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Audio handling (for API compatibility)
hound = "3.5"
bytes = "1.5"

# Utility
uuid = { version = "1.4", features = ["v4"] }
rand = "0.8"

[dev-dependencies]
pretty_assertions = "1.4"
test-log = "0.2"
env_logger = "0.11"
tracing-subscriber = "0.3"
rvoip-sip-transport = { path = "../sip-transport" }
rvoip-registrar-core = { path = "../registrar-core" }
serial_test = { workspace = true }

[features]
default = []
event-history = []
persistence = ["sqlx"]

[dependencies.sqlx]
version = "0.7"
optional = true
features = ["sqlite", "runtime-tokio"]