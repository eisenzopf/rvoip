[package]
name = "rvoip-sip-transport"
# 🎯 INHERIT VERSION AND METADATA FROM WORKSPACE!
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

# Crate-specific description
description = "Transport layer for SIP - UDP, TCP, TLS support"

# ✨ INHERIT LINTS FROM WORKSPACE
[lints]
workspace = true

[dependencies]
# 🎯 INTERNAL CRATES
rvoip-sip-core.workspace = true
rvoip-infra-common.workspace = true

# External dependencies from workspace
tokio.workspace = true
async-trait.workspace = true
thiserror.workspace = true
anyhow.workspace = true
bytes.workspace = true
tracing.workspace = true

# TLS support
tokio-rustls = { version = "0.26", optional = true }
rustls = { version = "0.23", optional = true, default-features = false, features = ["std", "tls12", "ring"] }
rustls-pemfile = { version = "2.0", optional = true }
rustls-pki-types = { version = "1", optional = true }

# WebSocket support
tokio-tungstenite = { version = "0.26", optional = true }
http = { version = "1.0", optional = true }

# SCTP support (RFC 4168) - user-space SCTP over UDP
webrtc-sctp = { version = "0.17.1", optional = true }
webrtc-util = { version = "0.17.1", optional = true }

# Add futures-util dependency
futures-util = "0.3"

[features]
default = ["udp", "tcp", "tls", "ws"]
udp = []
tls = ["dep:tokio-rustls", "dep:rustls", "dep:rustls-pemfile", "dep:rustls-pki-types"]
tcp = []
ws = ["dep:tokio-tungstenite", "dep:http"]
sctp = ["dep:webrtc-sctp", "dep:webrtc-util"]

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tracing-subscriber = { workspace = true } 