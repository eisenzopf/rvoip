[package]
name = "rvoip-sip-transport"
# 🎯 INHERIT VERSION AND METADATA FROM WORKSPACE!
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

# Crate-specific description
description = "Transport layer for SIP - UDP, TCP, TLS support"

# ✨ INHERIT LINTS FROM WORKSPACE
[lints]
workspace = true

[dependencies]
# 🎯 INTERNAL CRATES
rvoip-sip-core.workspace = true
rvoip-infra-common.workspace = true

# External dependencies from workspace
tokio.workspace = true
async-trait.workspace = true
thiserror.workspace = true
anyhow.workspace = true
bytes.workspace = true
tracing.workspace = true

# TLS support
tokio-rustls = { version = "0.24", optional = true }
# `dangerous_configuration` is required for the dev-only
# `TlsClientConfig::insecure_skip_verify` cert verifier. Production
# default validation does not depend on it.
rustls = { version = "0.21", optional = true, features = ["dangerous_configuration"] }
rustls-pemfile = { version = "1.0", optional = true }
# Client cert verification: prefer system trust store, fall back to a
# bundled root set. Both pinned to versions compatible with rustls 0.21.
rustls-native-certs = { version = "0.6", optional = true }
webpki-roots = { version = "0.25", optional = true }

# WebSocket support
tokio-tungstenite = { version = "0.19", optional = true }
http = { version = "0.2", optional = true }

# Add futures-util dependency
futures-util = "0.3"

[features]
default = ["udp", "tcp", "tls", "ws"]
udp = []
tls = ["dep:tokio-rustls", "dep:rustls", "dep:rustls-pemfile", "dep:rustls-native-certs", "dep:webpki-roots"]
tcp = []
ws = ["dep:tokio-tungstenite", "dep:http"]

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tracing-subscriber = { workspace = true }
# Generate self-signed certs in TLS handshake tests.
rcgen = "0.12"
tempfile = "3"
