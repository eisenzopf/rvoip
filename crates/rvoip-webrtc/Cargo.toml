[package]
name = "rvoip-webrtc"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true
description = "rvoip-core WebRTC interop adapter built on webrtc-rs 0.20.0-alpha.1"

[features]
default = []
signaling-whip = ["dep:axum", "dep:hyper", "dep:tower", "dep:tower-http", "dep:serde_json"]
signaling-ws = ["dep:tokio-tungstenite", "dep:serde_json"]
client = []
comprehensive = ["client", "signaling-ws", "dep:serde_json"]
# D3a — cpal-backed microphone capture + speaker playback, real Opus encoder.
# Use to ship a "cargo add rvoip-webrtc; place a call from a laptop"
# experience without writing platform glue. Pulls in `comprehensive`
# (the existing client base — `client` alone has unsatisfied serde_json
# uses in `client::native`).
client-cpal = ["comprehensive", "dep:cpal", "dep:opus"]
# D3 — `VideoSource` / `VideoSink` trait surface + RFC 7741/6184 packetizers
# (pure Rust). Concrete encoder backends are gated separately so users
# can pick the codec they need without pulling both native deps.
client-video = ["comprehensive"]
# D3b — VP8 encoder via `vpx-encode` (libvpx). Camera capture via `nokhwa`.
# Native deps: `libvpx` on the build machine (e.g. `brew install libvpx`).
# `env-libvpx-sys` is pulled in with the `generate` feature so bindgen
# adapts to whichever libvpx version is installed locally.
client-video-vp8 = ["client-video", "dep:vpx-encode", "dep:env-libvpx-sys", "dep:nokhwa"]
# D3c — H.264 encoder via `openh264`. Camera capture via `nokhwa`.
# Native deps: `nokhwa` requires platform camera frameworks (AVFoundation
# on macOS, V4L2 on Linux). `openh264` fetches a BSD-licensed binary at
# build time — see <https://github.com/cisco/openh264>.
client-video-h264 = ["client-video", "dep:openh264", "dep:nokhwa"]
tls-rustls = ["dep:axum-server", "dep:tokio-rustls", "dep:rustls", "dep:rustls-pemfile"]
# Headless-Chromium driven interop test (dev-only; needs Chromium binary on PATH).
interop-browser = ["signaling-whip", "signaling-ws", "dep:chromiumoxide"]
# Long-running soak test (default 60s; set SOAK_SECS=3600 for the full 1h run).
# Asserts tokio task count returns to baseline after sustained churn — catches
# task leaks that the regular test suite doesn't have time to surface.
soak-1h = []
bridge-quic = [
    "signaling-whip",
    "dep:rvoip-quic",
    "dep:rvoip-uctp",
    "dep:rvoip-auth-core",
    "dep:quinn",
    "dep:rustls",
    "dep:serde_json",
]

[dependencies]
rvoip-core.workspace = true
webrtc = { workspace = true, features = ["runtime-tokio"] }
rtc.workspace = true

tokio = { workspace = true }
async-trait.workspace = true
futures.workspace = true
bytes.workspace = true
dashmap.workspace = true
parking_lot.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
tracing.workspace = true
thiserror.workspace = true
chrono.workspace = true
url = "2"
hmac = { workspace = true }
sha2 = { workspace = true }
base64 = { workspace = true }

rvoip-quic = { workspace = true, optional = true }
rvoip-uctp = { workspace = true, optional = true }
rvoip-auth-core = { workspace = true, optional = true }
quinn = { workspace = true, optional = true }
rustls = { workspace = true, optional = true }

axum = { workspace = true, optional = true }
hyper = { version = "1", optional = true }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.6", features = ["trace", "cors"], optional = true }
tokio-tungstenite = { workspace = true, optional = true }
axum-server = { workspace = true, optional = true }
tokio-rustls = { workspace = true, optional = true }
rustls-pemfile = { workspace = true, optional = true }
chromiumoxide = { workspace = true, optional = true }

# D3a — cpal microphone/speaker + opus encoder. Both pinned to the same
# versions audio-core (`cpal = "0.15"`) and media-core (`opus = "0.3"`)
# already use, so cargo resolves a single copy across the workspace.
cpal = { version = "0.15", optional = true }
opus = { version = "0.3", optional = true }

# D3b/c — video encoder + camera capture (all optional).
# `nokhwa` 0.10 with `input-native` for cross-platform camera capture.
# `vpx-encode` 0.7 wraps libvpx for VP8/VP9 encoding.
# `openh264` 0.6 wraps Cisco's BSD-licensed H.264 encoder.
nokhwa = { version = "0.10", default-features = false, features = ["input-native"], optional = true }
vpx-encode = { version = "0.6", optional = true }
# `env-libvpx-sys` ships pre-generated bindings only for older libvpx
# versions; on macOS we install libvpx 1.16 from homebrew which doesn't
# match. Force the `generate` feature so the build runs bindgen against
# whatever libvpx is installed locally.
env-libvpx-sys = { version = "5", features = ["generate"], optional = true }
openh264 = { version = "0.6", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tracing-subscriber.workspace = true
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
tokio-tungstenite = { workspace = true, features = ["rustls-tls-webpki-roots"] }
rustls.workspace = true
rvoip-quic.workspace = true
rvoip-uctp.workspace = true
rvoip-auth-core.workspace = true
quinn.workspace = true
parking_lot.workspace = true
serde_json.workspace = true
rcgen.workspace = true
rvoip-sip = { workspace = true }
rand = { workspace = true }

