[package]
name = "rvoip-infra-common"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true

# Crate-specific description
description = "High-performance infrastructure and event systems for the RVOIP stack"

# ✨ INHERIT LINTS FROM WORKSPACE (no need to duplicate!)
[lints]
workspace = true

[dependencies]
# External dependencies from workspace
tokio.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["json"] }
futures.workspace = true
async-trait.workspace = true
dashmap.workspace = true

# Crate-specific dependencies
config = "0.14"
once_cell = "1.18.0"
mimalloc = { version = "0.1", default-features = false }
libmimalloc-sys = { version = "0.1", default-features = false, features = ["extended"], optional = true }
anyhow = "1.0"
tokio-util = "0.7.16"
# SIP_API_DESIGN_2 Phase A: bus payloads carry original inbound bytes
# (Arc<bytes::Bytes>) — *not* Arc<rvoip_sip_core::Request> — so foundation
# crates remain SIP-agnostic.
bytes = { workspace = true }

# P12.7 — OpenTelemetry span hierarchy. Optional, gated on the
# `otel` feature so consumers that don't want the OTLP exporter
# don't pay the dep cost. Pinned to the 0.27 line which matches
# the current `tracing-opentelemetry` API surface.
opentelemetry = { version = "0.27", default-features = false, features = ["trace"], optional = true }
opentelemetry_sdk = { version = "0.27", default-features = false, features = ["trace", "rt-tokio"], optional = true }
opentelemetry-otlp = { version = "0.27", default-features = false, features = ["http-proto", "trace", "reqwest-blocking-client"], optional = true }
tracing-opentelemetry = { version = "0.28", default-features = false, optional = true }

[features]
# Disable the mimalloc `#[global_allocator]` in `lib.rs`. Required by
# profiling consumers (e.g. `rvoip-sip`'s `dhat` feature) that swap in
# their own allocator and can't coexist with mimalloc. Off by default
# so production binaries keep mimalloc's perf win.
no-global-allocator = []
memory-diagnostics = ["mimalloc/extended", "dep:libmimalloc-sys"]

# P12.7 — wire an OpenTelemetry OTLP exporter layer into
# `logging::setup`. When this feature is on AND
# `LoggingConfig.otel_endpoint` is `Some(_)`, spans flow to the
# configured collector in addition to the local subscriber. Off by
# default so consumers without an OTel collector don't pull the
# extra deps or pay the runtime overhead.
otel = [
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "dep:tracing-opentelemetry",
]

[dev-dependencies]
criterion.workspace = true
chrono.workspace = true

[[bench]]
name = "api_bench"
harness = false
