[package]
name = "rvoip-vcon-postgres"
version = "0.1.3"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true
description = "Postgres-backed vCon store for rvoip-vcon, with an optional bridge for rvoip-core byte-oriented VconStore."

[features]
default = []
core-store = ["dep:bytes", "dep:rvoip-core"]

[dependencies]
rvoip-vcon.workspace = true
rvoip-core = { workspace = true, optional = true }

async-trait.workspace = true
bytes = { workspace = true, optional = true }
chrono = { workspace = true, features = ["serde"] }
serde_json.workspace = true
sha2.workspace = true
thiserror.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["v4", "serde"] }

sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid", "json"] }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }

[lints]
workspace = true
