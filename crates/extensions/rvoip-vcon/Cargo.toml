[package]
name = "rvoip-vcon"
# Alpha-tier but DOES publish — rvoip-core lists rvoip-vcon as an
# optional runtime dep (vcon-signing feature), so cargo verifies this
# version exists on crates.io even when the feature isn't activated.
version = "0.1.3"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true
description = "vCon (Virtualized Conversation) document builder + store per the IETF vCon WG draft. Builds + signs the recording artifacts UCTP / SIP / WebRTC adapters reference via Event::RecordingComplete.vcon_ref."

[dependencies]
# V2.A — rvoip-core dep dropped (was unused except in doc comments).
# This combined with auth-core's switch to rvoip-core-traits breaks
# the rvoip-core → rvoip-vcon → rvoip-auth-core → rvoip-core cycle.
rvoip-auth-core.workspace = true

tokio = { workspace = true }
async-trait.workspace = true
parking_lot.workspace = true
dashmap.workspace = true

serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
chrono = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["v4", "serde"] }

# JWS signing reuses the auth-core jsonwebtoken stack.
jsonwebtoken = "9.3"

thiserror = "1.0"
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }

[lints]
workspace = true
