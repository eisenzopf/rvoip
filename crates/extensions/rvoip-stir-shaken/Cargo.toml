[package]
name = "rvoip-stir-shaken"
version = "0.1.0"
edition = "2021"
authors = ["RVoIP Contributors"]
description = "STIR/SHAKEN (RFC 8224 / RFC 8225 / ATIS-1000074) signing and verification for rvoip"
license = "MIT"
homepage = "https://github.com/eisenzopf/rvoip"
repository = "https://github.com/eisenzopf/rvoip"
keywords = ["sip", "stir-shaken", "voip", "telephony", "passport"]
categories = ["network-programming", "authentication"]

# Optional sibling crate consumed via path dependency by applications
# that need STIR/SHAKEN signing / verification. Same packaging pattern
# as `rvoip-auth-core`. Heavy crypto/HTTP deps (jsonwebtoken,
# x509-parser, webpki, reqwest) are isolated here so consumers of
# rvoip-sip-dialog that don't need STIR/SHAKEN don't pay for them.
#
# The trait surface (PASSporTSigner / PASSporTVerifier / VerificationOutcome)
# lives in rvoip-sip-dialog where the hooks attach; this crate provides
# the reference implementations.

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["rt", "macros", "sync"] }
async-trait = "0.1"

# Internal — typed Identity header (RFC 8224) and Request/Response types
rvoip-sip-core.workspace = true

# Trait surface that this crate's impls satisfy
rvoip-sip-dialog.workspace = true

# JWS / JWT for PASSporT (RFC 8225)
jsonwebtoken = "9.3"

# Certificate parsing for SHAKEN profile checks (TNAuthList, JWT Claim Constraints)
x509-parser = "0.16"

# Path validation against operator-supplied STI-CA trust anchors.
# Aligned with the rustls 0.23 / rustls-webpki 0.103 resolution used by
# the workspace TLS path.
webpki = { package = "rustls-webpki", version = "0.103.13", features = ["ring"] }
rustls-pki-types = "1.12"

# HTTP fetch of the info= cert URL
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# URL handling
url = "2.5"

# UUIDs (origid claim — RFC 8588)
uuid = { version = "1.0", features = ["v4", "serde"] }

# Errors
thiserror = "1.0"

# Base64url for PASSporT JWT segments
base64 = "0.22"

# Logging
tracing = "0.1"

# Shared types
bytes = "1.0"

[dev-dependencies]
tokio = { version = "1.40", features = ["full", "test-util"] }
# rcgen lets the integration tests generate root + leaf chains and
# stamp SHAKEN-specific X.509 extensions (TNAuthList, JWT Claim
# Constraints) via CustomExtension::from_oid_content. No external
# certs required.
rcgen = "0.14"
# Used by chain-validation tests to set leaf `not_after`; same
# version rcgen pulls in transitively.
time = "0.3.47"
async-trait = "0.1"
