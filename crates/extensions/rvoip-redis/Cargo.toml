[package]
name = "rvoip-redis"
version = "0.1.3"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true
description = "Redis-backed auth provider implementations for RVoIP"

[features]
default = []
moq = ["dep:rvoip-moq"]

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true }
redis = { version = "0.27", default-features = false, features = ["script", "tokio-comp"] }
rvoip-auth-core.workspace = true
rvoip-moq = { workspace = true, optional = true }
sha2 = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
rvoip-core-traits.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }

[lints]
workspace = true
