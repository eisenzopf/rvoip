[package]
name = "rvoip-harness"
# Alpha-tier but DOES publish — rvoip-core lists rvoip-harness as an
# optional runtime dep (harness feature), so cargo verifies this version
# exists on crates.io even when the feature isn't activated.
version = "0.1.0"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
authors.workspace = true
rust-version.workspace = true
categories.workspace = true
keywords.workspace = true
description = "Pluggable provider trait surfaces for ASR, TTS, DialogManager, RecordingSink — consumed by rvoip-core for the AI / recording harness."

[dependencies]
async-trait.workspace = true
bytes.workspace = true
# V2.A — depend on the trait-only crate so rvoip-core can take an
# optional `rvoip-harness` dep behind the `harness` feature without
# cycling.
rvoip-core-traits.workspace = true
tokio.workspace = true

[lints]
workspace = true
