version: "3.9"

services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rvoip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-rvoip}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rvoip"]
      interval: 5s
      timeout: 3s
      retries: 5

  console:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "5060:5060/udp"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      RVOIP_JWT_SECRET: ${RVOIP_JWT_SECRET:?RVOIP_JWT_SECRET must be set}
      RVOIP_ADMIN_PASSWORD: ${RVOIP_ADMIN_PASSWORD:?RVOIP_ADMIN_PASSWORD must be set}
      RUST_LOG: info,rvoip_web_console=debug

volumes:
  pgdata:
