[package]
name = "peer-to-peer-demo"
version = "0.1.0"
edition = "2021"
description = "Peer-to-peer SIP call demo using client-core"

[[bin]]
name = "peer_a"
path = "src/peer_a.rs"

[[bin]]
name = "peer_b"
path = "src/peer_b.rs"

[dependencies]
rvoip = "0.1.22"

tokio = { version = "1.0", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
async-trait = "0.1"

[workspace] 
