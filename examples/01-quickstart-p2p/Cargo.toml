[package]
name = "rvoip-example-quickstart-p2p"
version = "0.1.0"
edition = "2021"
publish = false

# Standalone project: this empty table detaches the example from the parent
# rvoip workspace so `cargo build` here resolves against the example's own
# lockfile while still pulling `rvoip-sip` by path from the live tree.
[workspace]

[dependencies]
# version + path: builds against the LOCAL tree now (so the example always
# reflects current code and breaks loudly on API drift) while recording the
# crates.io version used at publish time. Copying this example into your own
# project? Drop the `path` and keep: rvoip-sip = "0.2.0"
rvoip-sip = { version = "0.2.0", path = "../../crates/sip/rvoip-sip" }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }

[[bin]]
name = "caller"
path = "src/caller.rs"

[[bin]]
name = "callee"
path = "src/callee.rs"
