[package]
name = "rvoip-example-ai-harness-demo"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
async-trait = "0.1"
bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
rvoip-core-traits = { version = "0.2.2", path = "../../crates/foundation/rvoip-core-traits" }
rvoip-harness = { version = "0.1.0", path = "../../crates/extensions/rvoip-harness" }
rvoip-vcon = { version = "0.1.0", path = "../../crates/extensions/rvoip-vcon" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
