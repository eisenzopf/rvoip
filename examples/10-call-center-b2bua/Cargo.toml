[package]
name = "rvoip-example-call-center-b2bua"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
# Copying into your own project? Drop `path` and keep: rvoip-sip = "0.2.0"
rvoip-sip = { version = "0.2.0", path = "../../crates/sip/rvoip-sip" }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }

# The B2BUA call-center server.
[[bin]]
name = "server"
path = "src/server.rs"

# An agent endpoint that auto-answers bridged calls.
[[bin]]
name = "agent"
path = "src/agent.rs"

# A customer that dials the support line.
[[bin]]
name = "customer"
path = "src/customer.rs"
