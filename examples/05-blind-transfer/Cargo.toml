[package]
name = "rvoip-example-blind-transfer"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
# Copying into your own project? Drop `path` and keep: rvoip-sip = "0.2.0-beta.1"
rvoip-sip = { version = "0.2.0-beta.1", path = "../../crates/sip/rvoip-sip" }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[bin]]
name = "alice"
path = "src/alice.rs"

[[bin]]
name = "bob"
path = "src/bob.rs"

[[bin]]
name = "charlie"
path = "src/charlie.rs"
