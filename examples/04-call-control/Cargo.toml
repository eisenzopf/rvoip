[package]
name = "rvoip-example-call-control"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
# Copying into your own project? Drop `path` and keep: rvoip-sip = "0.2.2"
rvoip-sip = { version = "0.2.2", path = "../../crates/sip/rvoip-sip" }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }

[[bin]]
name = "controller"
path = "src/controller.rs"

[[bin]]
name = "peer"
path = "src/peer.rs"
